<!-- MAIN -->
<main class="main-content">
  <h1 class="text-2xl font-bold mb-6">Дашборд</h1>

  <!-- Stats (filled by loadSummary()) -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
    <div class="stat-card liquid-glass">
      <div class="stat-card-icon" style="background:rgba(29,78,216,.4)"><svg width="22" height="22" fill="none" stroke="#5C80E3" stroke-width="2"><path d="M21 12V7H5a2 2 0 010-4h14v4M3 5v14a2 2 0 002 2h16v-5M18 12a2 2 0 100 4 2 2 0 000-4z"/></svg></div>
      <div class="stat-card-label">Total PnL</div>
      <div class="stat-card-value" id="balanceVal">—</div>
    </div>
    <div class="stat-card liquid-glass">
      <div class="stat-card-icon" style="background:rgba(29,78,216,.18)"><svg width="22" height="22" fill="none" stroke="#5C80E3" stroke-width="2"><path d="M12 2a4 4 0 014 4v1h2a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V9a2 2 0 012-2h2V6a4 4 0 014-4z"/></svg></div>
      <div class="stat-card-label">Активные боты</div>
      <div class="stat-card-value">—</div>
    </div>
    <div class="stat-card liquid-glass">
      <div class="stat-card-icon" style="background:rgba(43,89,54,.18)"><svg width="22" height="22" fill="none" stroke="#66876E" stroke-width="2"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div>
      <div class="stat-card-label">Сигналов всего</div>
      <div class="stat-card-value">—</div>
    </div>
    <div class="stat-card liquid-glass">
      <div class="stat-card-icon" style="background:rgba(130,98,98,.18)"><svg width="22" height="22" fill="none" stroke="#C8B9B9" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
      <div class="stat-card-label">Win Rate</div>
      <div class="stat-card-value">—</div>
    </div>
  </div>

  <!-- Chart + Signals -->
  <div class="grid lg:grid-cols-3 gap-6 mb-6">
    <!-- Equity Chart -->
    <div class="lg:col-span-2 card" data-tour="equity">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-bold">Кривая капитала</h2>
        <div class="flex gap-1">
          <button class="text-xs px-3 py-1 rounded-lg bg-indigo-500/20 text-indigo-300" onclick="updateChart(7)">1W</button>
          <button class="text-xs px-3 py-1 rounded-lg hover:bg-slate-700/50 text-slate-400" onclick="updateChart(30)">1M</button>
          <button class="text-xs px-3 py-1 rounded-lg hover:bg-slate-700/50 text-slate-400" onclick="updateChart(90)">3M</button>
        </div>
      </div>
      <div style="position:relative;height:280px;overflow:hidden">
        <canvas id="equityChart" style="display:block;max-width:100%;max-height:100%"></canvas>
      </div>
    </div>
    <!-- Recent Signals -->
    <div class="card">
      <div class="flex items-center justify-between mb-4"><h2 class="font-bold">Последние сигналы</h2><a href="signals.html" class="text-xs text-indigo-400 hover:underline">Все</a></div>
      <div class="space-y-3" id="recentSignals">
        <div class="text-xs text-slate-500 text-center py-4">Загрузка…</div>
      </div>
    </div>

  <!-- Recent Trades -->
  <div class="card">
    <div class="flex items-center justify-between mb-4"><h2 class="font-bold">Последние сделки</h2></div>
    <div class="overflow-x-auto">

        <thead><tr class="text-xs text-slate-500 uppercase"><th class="text-left p-3">Дата</th><th class="text-left p-3">Пара</th><th class="text-left p-3">Направление</th><th class="text-left p-3">Вход</th><th class="text-left p-3">Выход</th><th class="text-left p-3">PnL</th><th class="text-left p-3">R:R</th></tr></thead>
        <tbody><tr><td colspan="7" class="p-4 text-center text-slate-500 text-sm">Загрузка сделок…</td></tr></tbody>
      </table>
    </div>

<script src="app.js"></script>
<script src="onboarding.js" defer></script>
<script>
if(!Auth.requireAuth()) throw new Error('noauth');

// Sidebar active state + user name
document.querySelectorAll('.sidebar-link[data-page="dashboard"]').forEach(a => a.classList.add('active'));
(Auth.user && Auth.user.displayName) && (document.querySelector('.topbar-username') && (document.querySelector('.topbar-username').textContent = Auth.user.displayName));
(Auth.user && Auth.user.email) && (document.querySelector('.topbar-avatar') && (document.querySelector('.topbar-avatar').textContent = Auth.user.email[0].toUpperCase()));

// ── Summary: total PnL, active bots, signals today, win rate ──
async function loadSummary() {
  try {
    const [botSummary, sigStats] = await Promise.all([
      API.botSummary().catch(() => ({ totalBots: 0, activeBots: 0, openTrades: 0, totalPnl: 0 })),
      API.mySignalStats().catch(() => ({ total: 0, winRate: null })),
    ]);
    const balEl = document.getElementById('balanceVal');
    if (balEl) balEl.textContent = Fmt.currency(botSummary.totalPnl);
    // Populate stat cards by order (4 cards)
    const cards = document.querySelectorAll('.stat-card .stat-card-value');
    if (cards[0]) cards[0].textContent = Fmt.currency(botSummary.totalPnl);
    if (cards[1]) cards[1].textContent = botSummary.activeBots + ' / ' + botSummary.totalBots;
    if (cards[2]) cards[2].textContent = sigStats.total;
    if (cards[3]) cards[3].textContent = sigStats.winRate !== null ? Fmt.percent(sigStats.winRate * 100, { decimals: 1 }) : '—';
  } catch (err) {
    Toast.error('Не удалось загрузить сводку: ' + err.message);
  }
}

// ── Recent signals ──
async function loadRecentSignals() {
  const host = document.getElementById('recentSignals');
  if (!host) return;
  try {
    const data = await API.listSignals({ limit: 5 });
    host.innerHTML = '';
    if (!data.signals.length) {
      host.innerHTML = '<div class="text-sm text-slate-500 p-3">Пока нет сигналов. Создай бота для начала.</div>';
      return;
    }
    for (const s of data.signals) {
      const sideColor = s.side === 'long' ? 'text-green-400' : 'text-red-400';
      const sideBg = s.side === 'long' ? 'bg-green-500/15' : 'bg-red-500/15';
      const row = document.createElement('div');
      row.className = 'flex items-center justify-between p-3 bg-slate-800/30 rounded-lg';
      row.innerHTML = `
        <div><div class="font-semibold text-sm">${s.symbol}</div>
        <div class="text-xs text-slate-500">${s.strategy.toUpperCase()} · ${Fmt.timeAgo(s.createdAt)}</div></div>
        <div class="text-right">
          <span class="text-xs px-2 py-0.5 rounded-full ${sideBg} ${sideColor}">${s.side.toUpperCase()}</span>
          <div class="text-xs text-slate-400 mt-1">Q ${s.quality || '—'}</div>
        </div>`;
      host.appendChild(row);
    }
  } catch (err) {
    host.innerHTML = '<div class="text-sm text-red-400 p-3">Ошибка загрузки сигналов.</div>';
  }
}

// ── Recent trades table ──
async function loadRecentTrades() {
  const tbody = document.querySelector('.card table tbody');
  if (!tbody) return;
  try {
    const bots = await API.listBots();
    if (!bots.bots.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="p-4 text-center text-slate-500 text-sm">Сделок пока нет — создай бота, чтобы начать</td></tr>';
      return;
    }
    // Fetch trades for each bot and merge
    const tradeArrays = await Promise.all(bots.bots.map(b => API.botTrades(b.id, { limit: 10 }).catch(() => ({ trades: [] }))));
    const trades = tradeArrays.flatMap(r => r.trades || []).sort((a, b) =>
      new Date(b.opened_at).getTime() - new Date(a.opened_at).getTime()).slice(0, 10);
    tbody.innerHTML = '';
    if (!trades.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="p-4 text-center text-slate-500 text-sm">Сделок пока нет</td></tr>';
      return;
    }
    for (const t of trades) {
      const pnl = Number(t.realized_pnl || 0);
      const pnlClass = pnl > 0 ? 'text-green-400' : pnl < 0 ? 'text-red-400' : 'text-slate-400';
      const sideClass = t.side === 'long' ? 'bg-green-500/15 text-green-400' : 'bg-red-500/15 text-red-400';
      const tr = document.createElement('tr');
      tr.className = 'border-t border-slate-800/50';
      tr.innerHTML = `
        <td class="p-3 text-slate-400">${Fmt.date(t.opened_at)}</td>
        <td class="p-3 font-medium">${t.symbol}</td>
        <td class="p-3"><span class="text-xs px-2 py-0.5 rounded-full ${sideClass}">${t.side.toUpperCase()}</span></td>
        <td class="p-3">${Fmt.price(t.entry_price)}</td>
        <td class="p-3">${t.exit_price ? Fmt.price(t.exit_price) : '—'}</td>
        <td class="p-3 ${pnlClass}">${pnl ? Fmt.currency(pnl, { decimals: 2 }) : '—'}</td>
        <td class="p-3">${t.status === 'open' ? '<span class="text-xs text-cyan-400">OPEN</span>' : (t.realized_pnl_pct ? Fmt.percent(t.realized_pnl_pct, { decimals: 1, sign: true }) : '—')}</td>`;
      tbody.appendChild(tr);
    }
  } catch (err) { /* silent */ }
}

// ── Equity chart (30-day PnL reconstruction from trades) ──
let eChart;
async function buildChart(days) {
  try {
    const since = Date.now() - days * 86_400_000;
    const bots = await API.listBots();
    const tradeArrays = await Promise.all(bots.bots.map(b => API.botTrades(b.id, { limit: 500, status: 'closed' }).catch(() => ({ trades: [] }))));
    const trades = tradeArrays.flatMap(r => r.trades || [])
      .filter(t => new Date(t.closed_at).getTime() >= since)
      .sort((a, b) => new Date(a.closed_at).getTime() - new Date(b.closed_at).getTime());
    let equity = 10000;
    const points = [{ t: since, v: equity }];
    for (const t of trades) { equity += Number(t.realized_pnl || 0); points.push({ t: new Date(t.closed_at).getTime(), v: equity }); }
    const cfg = {
      type: 'line',
      data: {
        labels: points.map(p => new Date(p.t).toISOString().slice(5, 10)),
        datasets: [{
          data: points.map(p => p.v),
          borderColor: '#93AAEC',
          backgroundColor: 'rgba(29,78,216,.2)',
          fill: true, tension: .4, pointRadius: 0, borderWidth: 2,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        resizeDelay: 150,
        animation: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { display: false } },
          y: { ticks: { color: '#64748b', font: { size: 10 }, callback: v => Fmt.currency(v, { decimals: 0 }) }, grid: { color: 'rgba(30,41,59,.3)' } },
        },
      },
    };
    if (eChart) eChart.destroy();
    const el = document.getElementById('equityChart');
    if (el) eChart = new Chart(el, cfg);
  } catch (err) { /* chart absent — ignore */ }
}
window.updateChart = (d) => buildChart(d);

// ── WS live updates ──
WS.on('signal', () => loadRecentSignals());
WS.on('trade_opened', () => { loadSummary(); loadRecentTrades(); });
WS.on('payment_confirmed', () => { Toast.success('Оплата подтверждена — тариф обновлён'); loadSummary(); });

// Stripe success redirect — show confirmation + strip query so a refresh stays clean.
(function(){
  try {
    const q = new URLSearchParams(location.search);
    if (q.get('paid') === '1') {
      Toast.success('Оплата получена — тариф активирован');
      history.replaceState({}, '', location.pathname);
    }
  } catch (_e) {}
})();

// Boot
loadSummary();
loadRecentSignals();
loadRecentTrades();
buildChart(7);
setInterval(loadSummary, 30_000);
</script>
