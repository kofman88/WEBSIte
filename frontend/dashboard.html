<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>CHM Finance — Дашборд</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
  <link rel="stylesheet" href="styles.css"/>
  <script>if(localStorage.getItem('chm_theme')==='light')document.documentElement.classList.add('light')</script>
  <style>
    body{background:#070b14;color:#f1f5f9;font-family:'Inter',sans-serif}
    html.light body{background:#f8f9fc;color:#1e293b}
    html.light .sidebar{background:#f0f2f7;border-color:rgba(0,0,0,.06)}
    html.light .sidebar-link{color:#64748b}html.light .sidebar-link.active{color:#4f46e5;background:rgba(79,70,229,.06)}
    html.light .topbar{background:rgba(248,249,252,.85)!important;border-color:rgba(0,0,0,.06)!important}
    html.light .stat-card,.light .card{background:rgba(255,255,255,.5)!important;border-color:rgba(0,0,0,.06)!important}
    html.light h1,html.light h2,html.light .font-bold,html.light .font-semibold{color:#0f172a!important}
    html.light p,html.light .text-slate-400,html.light .text-slate-500,html.light .stat-card-label{color:#64748b!important}
    html.light .text-white{color:#1e293b!important}
    html.light .sidebar-sub-badge{background:rgba(79,70,229,.06);border-color:rgba(79,70,229,.1)}
    html.light .bg-slate-800\/30{background:rgba(0,0,0,.02)!important}
    html.light .notif-panel{background:rgba(255,255,255,.98)!important;border-color:rgba(0,0,0,.08)!important}
    .mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
    .skeleton{background:linear-gradient(90deg,rgba(30,41,59,.3) 25%,rgba(30,41,59,.5) 50%,rgba(30,41,59,.3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;height:1.5em;width:60%}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .notif-panel{position:absolute;top:100%;right:0;width:360px;max-height:400px;overflow-y:auto;background:rgba(15,23,42,.98);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.06);border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.5);display:none;z-index:60}
    .notif-panel.open{display:block}
    .notif-item{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
    .notif-item:hover{background:rgba(255,255,255,.03)}
    .notif-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px}
    .empty-state{text-align:center;padding:40px 20px;color:#64748b}
    .empty-state svg{margin:0 auto 12px;opacity:.3}
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">CHM<span>.</span></div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="sidebar-link active" data-page="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Дашборд</a>
    <a href="bots.html" class="sidebar-link" data-page="bots"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 014 4v1h2a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V9a2 2 0 012-2h2V6a4 4 0 014-4z"/></svg>Боты</a>
    <a href="signals.html" class="sidebar-link" data-page="signals"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>Сигналы</a>
    <a href="backtests.html" class="sidebar-link" data-page="backtests"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6m6 0h10"/></svg>Бэктесты</a>
    <a href="wallet.html" class="sidebar-link" data-page="wallet"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12V7H5a2 2 0 010-4h14v4M3 5v14a2 2 0 002 2h16v-5"/></svg>Биржи</a>
    <a href="settings.html" class="sidebar-link" data-page="settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>Настройки</a>
    <a href="academy/" class="sidebar-link" data-page="academy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>Академия</a>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-sub-badge" id="planBadge"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg><span id="planName">Free</span></div>
    <button onclick="Auth.logout()" class="sidebar-link mt-2" style="color:#f87171"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Выйти</button>
  </div>
</aside>

<!-- TOPBAR -->
<header class="topbar">
  <div class="flex items-center gap-4">
    <button id="sidebar-toggle" class="lg:hidden" style="background:none;border:none;color:#94a3b8;cursor:pointer"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
    <h1 class="text-lg font-bold hidden sm:block">Дашборд</h1>
  </div>
  <div class="topbar-actions">
    <!-- Notifications -->
    <div class="relative" id="notifWrap">
      <button onclick="toggleNotif()" class="topbar-notification">
        <svg width="20" height="20" fill="none" stroke="#94a3b8" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
        <div class="dot" id="notifDot" style="display:none"></div>
      </button>
      <div class="notif-panel" id="notifPanel">
        <div class="flex items-center justify-between p-4 border-b border-white/[.04]">
          <span class="font-semibold text-sm" data-dl="notif">Уведомления</span>
          <button onclick="clearNotifs()" class="text-xs text-slate-500 hover:text-white">Очистить</button>
        </div>
        <div id="notifList">
          <div class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>Нет новых уведомлений</div>
        </div>
      </div>
    </div>
    <button onclick="toggleDashTheme()" id="dThemeBtn" class="text-sm w-8 h-8 flex items-center justify-center rounded-lg border border-slate-700/50 hover:bg-white/[.03] transition">🌙</button>
    <button onclick="toggleDashLang()" id="dLangBtn" class="text-xs text-slate-400 border border-slate-700/50 rounded-lg px-2.5 py-1.5 hover:text-white transition">EN</button>
    <div class="topbar-user"><div class="topbar-avatar" id="userAvatar">U</div><span class="topbar-username text-sm text-slate-300 hidden sm:block" id="userName">User</span></div>
  </div>
</header>

<!-- MAIN -->
<main class="main-content">
  <!-- Stats -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
    <div class="stat-card">
      <div class="stat-card-icon" style="background:rgba(79,70,229,.1)"><svg width="22" height="22" fill="none" stroke="#818CF8" stroke-width="2"><path d="M21 12V7H5a2 2 0 010-4h14v4M3 5v14a2 2 0 002 2h16v-5M18 12a2 2 0 100 4 2 2 0 000-4z"/></svg></div>
      <div class="stat-card-label">Баланс портфеля</div>
      <div class="stat-card-value mono" id="statBalance"><div class="skeleton"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-card-icon" style="background:rgba(6,182,212,.1)"><svg width="22" height="22" fill="none" stroke="#06b6d4" stroke-width="2"><path d="M12 2a4 4 0 014 4v1h2a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V9a2 2 0 012-2h2V6a4 4 0 014-4z"/></svg></div>
      <div class="stat-card-label">Активные боты</div>
      <div class="stat-card-value mono" id="statBots"><div class="skeleton"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-card-icon" style="background:rgba(16,185,129,.1)"><svg width="22" height="22" fill="none" stroke="#10b981" stroke-width="2"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div>
      <div class="stat-card-label">Сигналов сегодня</div>
      <div class="stat-card-value mono" id="statSignals"><div class="skeleton"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-card-icon" style="background:rgba(245,158,11,.1)"><svg width="22" height="22" fill="none" stroke="#f59e0b" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
      <div class="stat-card-label">Win Rate</div>
      <div class="stat-card-value mono" id="statWR"><div class="skeleton"></div></div>
    </div>
  </div>

  <!-- Live Chart — full width -->
  <div class="card mb-6" style="padding:0;overflow:hidden;border-radius:16px">
    <div class="flex items-center justify-between px-5 pt-4 pb-2">
      <div class="flex items-center gap-3">
        <h2 class="font-bold" data-dl="chart">График</h2>
        <select id="chartSymbol" class="text-xs bg-slate-800/50 border border-slate-700 rounded-lg px-2 py-1 text-white outline-none" onchange="loadTVChart()">
          <option value="BTCUSDT">BTC/USDT</option><option value="ETHUSDT">ETH/USDT</option><option value="SOLUSDT">SOL/USDT</option><option value="XRPUSDT">XRP/USDT</option><option value="DOGEUSDT">DOGE/USDT</option><option value="BNBUSDT">BNB/USDT</option>
          <option value="ADAUSDT">ADA/USDT</option><option value="AVAXUSDT">AVAX/USDT</option><option value="LINKUSDT">LINK/USDT</option><option value="NEARUSDT">NEAR/USDT</option>
          <option value="SUIUSDT">SUI/USDT</option><option value="INJUSDT">INJ/USDT</option><option value="ARBUSDT">ARB/USDT</option><option value="OPUSDT">OP/USDT</option>
          <option value="APTUSDT">APT/USDT</option><option value="DOTUSDT">DOT/USDT</option><option value="MATICUSDT">MATIC/USDT</option><option value="UNIUSDT">UNI/USDT</option>
          <option value="LTCUSDT">LTC/USDT</option><option value="ATOMUSDT">ATOM/USDT</option>
        </select>
      </div>
    </div>
    <div id="tvChartWrap" style="height:500px"></div>
  </div>

  <!-- Signals + Stats -->
  <div class="grid lg:grid-cols-3 gap-6 mb-6">
    <div class="card">
      <div class="flex items-center justify-between mb-4"><h2 class="font-bold" data-dl="signals">Последние сигналы</h2><a href="signals.html" class="text-xs text-indigo-400 hover:underline">Все</a></div>
      <div id="recentSignals">
        <div class="skeleton mb-3" style="height:48px;width:100%"></div>
        <div class="skeleton mb-3" style="height:48px;width:100%"></div>
        <div class="skeleton" style="height:48px;width:100%"></div>
      </div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
    <a href="bots.html" class="card flex items-center gap-3 p-4 hover:border-violet-500/20 transition cursor-pointer"><svg class="w-5 h-5 text-violet-400 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg><span class="text-sm">Создать бота</span></a>
    <a href="backtests.html" class="card flex items-center gap-3 p-4 hover:border-blue-500/20 transition cursor-pointer"><svg class="w-5 h-5 text-blue-400 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6m18-2V5a2 2 0 00-2-2h-2a2 2 0 00-2 2v14"/></svg><span class="text-sm">Бэктест</span></a>
    <a href="wallet.html" class="card flex items-center gap-3 p-4 hover:border-cyan-500/20 transition cursor-pointer"><svg class="w-5 h-5 text-cyan-400 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12V7H5a2 2 0 010-4h14v4M3 5v14a2 2 0 002 2h16v-5"/></svg><span class="text-sm">Подключить биржу</span></a>
    <a href="academy/" class="card flex items-center gap-3 p-4 hover:border-emerald-500/20 transition cursor-pointer"><svg class="w-5 h-5 text-emerald-400 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg><span class="text-sm">Академия</span></a>
  </div>

  <!-- Recent Trades -->
  <div class="card">
    <div class="flex items-center justify-between mb-4"><h2 class="font-bold" data-dl="trades">Последние сделки</h2></div>
    <div id="recentTrades">
      <div class="skeleton mb-2" style="height:40px;width:100%"></div>
      <div class="skeleton mb-2" style="height:40px;width:100%"></div>
    </div>
  </div>
</main>

<script src="app.js"></script>
<script>
// Theme
function toggleDashTheme(){document.documentElement.classList.toggle('light');const l=document.documentElement.classList.contains('light');localStorage.setItem('chm_theme',l?'light':'dark');document.getElementById('dThemeBtn').textContent=l?'☀️':'🌙'}
(function(){if(localStorage.getItem('chm_theme')==='light'){document.documentElement.classList.add('light');const b=document.getElementById('dThemeBtn');if(b)b.textContent='☀️'}})();

// Lang — full dashboard translation
let dashLang=localStorage.getItem('chm_lang')||'ru';
const DL={
  'Дашборд':'Dashboard','График':'Chart','Последние сигналы':'Recent Signals','Все':'All',
  'Последние сделки':'Recent Trades','Баланс портфеля':'Portfolio Balance','Активные боты':'Active Bots',
  'Сигналов сегодня':'Signals Today','Уведомления':'Notifications','Очистить':'Clear',
  'Нет новых уведомлений':'No new notifications','Сигналов пока нет.':'No signals yet.',
  'Сканер обновляется каждые 30 секунд.':'Scanner updates every 30 seconds.',
  'Нет ботов.':'No bots.','Создать первого бота':'Create first bot',
  'Сделок пока нет.':'No trades yet.','Создайте бота чтобы начать торговлю.':'Create a bot to start trading.',
};
function toggleDashLang(){
  dashLang=dashLang==='ru'?'en':'ru';
  localStorage.setItem('chm_lang',dashLang);
  document.getElementById('dLangBtn').textContent=dashLang==='ru'?'EN':'RU';
  applyDashLang();
}
function applyDashLang(){
  const en=dashLang==='en';
  // Stat labels
  document.querySelectorAll('.stat-card-label').forEach((el,i)=>{
    const ru=['Баланс портфеля','Активные боты','Сигналов сегодня','Win Rate'];
    const enL=['Portfolio Balance','Active Bots','Signals Today','Win Rate'];
    if(ru[i])el.textContent=en?enL[i]:ru[i];
  });
  // Sidebar
  document.querySelectorAll('.sidebar-link').forEach(el=>{
    const map=en?{'Дашборд':'Dashboard','Боты':'Bots','Сигналы':'Signals','Бэктесты':'Backtests','Биржи':'Exchanges','Настройки':'Settings','Академия':'Academy','Выйти':'Logout'}:{'Dashboard':'Дашборд','Bots':'Боты','Signals':'Сигналы','Backtests':'Бэктесты','Exchanges':'Биржи','Settings':'Настройки','Academy':'Академия','Logout':'Выйти'};
    const txt=el.textContent.trim();
    if(map[txt])el.childNodes[el.childNodes.length-1].textContent=map[txt];
  });
  // Headers with data-dl
  document.querySelectorAll('[data-dl]').forEach(el=>{
    const k=el.getAttribute('data-dl');
    const map={chart:en?'Chart':'График',signals:en?'Recent Signals':'Последние сигналы',trades:en?'Recent Trades':'Последние сделки',notif:en?'Notifications':'Уведомления'};
    if(map[k])el.textContent=map[k];
  });
}
(function(){if(localStorage.getItem('chm_lang')==='en'){dashLang='en';const b=document.getElementById('dLangBtn');if(b)b.textContent='RU';setTimeout(applyDashLang,200)}})();

if(!Auth.isLoggedIn())window.location.href='/?login=1';
Sidebar.init('dashboard');

// Close notif panel on outside click
document.addEventListener('click',e=>{if(!document.getElementById('notifWrap').contains(e.target))document.getElementById('notifPanel').classList.remove('open')});

function toggleNotif(){document.getElementById('notifPanel').classList.toggle('open')}

const notifications=[];
function addNotif(type,text){
  notifications.unshift({type,text,time:new Date()});
  if(notifications.length>20)notifications.pop();
  renderNotifs();
}
function clearNotifs(){notifications.length=0;renderNotifs();document.getElementById('notifDot').style.display='none'}
function renderNotifs(){
  const el=document.getElementById('notifList');
  if(!notifications.length){el.innerHTML='<div class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>Нет новых уведомлений</div>';return}
  const colors={signal:'#818CF8',trade:'#10b981',system:'#f59e0b',error:'#ef4444'};
  el.innerHTML=notifications.map(n=>`<div class="notif-item"><div class="notif-dot" style="background:${colors[n.type]||'#64748b'}"></div><div class="flex-1"><div class="text-sm">${n.text}</div><div class="text-xs text-slate-500 mt-1">${Utils.timeAgo(n.time)}</div></div></div>`).join('');
  document.getElementById('notifDot').style.display='';
}

// Load ALL real data
async function loadDashboard(){
  try{
    // User profile + subscription
    const me=await API.getProfile().catch(()=>null);
    if(me&&me.user){
      document.getElementById('userAvatar').textContent=(me.user.email||'U')[0].toUpperCase();
      document.getElementById('userName').textContent=me.user.email||'User';
      if(me.subscription){
        document.getElementById('planName').textContent=(me.subscription.plan||'free').charAt(0).toUpperCase()+(me.subscription.plan||'free').slice(1)+' Plan';
      }
    }

    // Bot stats
    const bs=await API.getBotStats().catch(()=>({stats:{}}));
    const s=bs.stats||bs||{};
    document.getElementById('statBalance').textContent='$'+(+(s.totalPnl||0)).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    document.getElementById('statBots').textContent=(s.activeBots||0)+' / '+(s.totalBots||0);

    // Signal stats
    const ss=await API.getSignalStats().catch(()=>({stats:{}}));
    const st=ss.stats||ss||{};
    document.getElementById('statSignals').textContent=st.totalToday||st.total||0;
    document.getElementById('statWR').textContent=(st.winRate||0)+'%';

    // Recent signals
    const sg=await API.getSignals({limit:5}).catch(()=>({signals:[]}));
    const sf=document.getElementById('recentSignals');
    if(sg.signals&&sg.signals.length){
      sf.innerHTML=sg.signals.map(s=>{
        const dir=s.direction||'long';
        const isLong=dir==='long';
        const pnl=s.pnl_pct;
        return `<div class="flex items-center justify-between p-3 bg-slate-800/30 rounded-lg mb-2">
          <div><div class="font-semibold text-sm">${s.symbol}</div><div class="text-xs text-slate-500">${s.strategy} &middot; ${s.timeframe||''}</div></div>
          <div class="text-right"><span class="text-xs px-2 py-0.5 rounded-full ${isLong?'bg-green-500/15 text-green-400':'bg-red-500/15 text-red-400'}">${dir.toUpperCase()}</span>
          <div class="text-xs mt-1 mono ${pnl>0?'text-green-400':pnl<0?'text-red-400':'text-cyan-400'}">${pnl?((pnl>0?'+':'')+pnl+'%'):'Active'}</div></div></div>`;
      }).join('');
      // Add notifications for new signals
      sg.signals.slice(0,3).forEach(s=>addNotif('signal',`${s.symbol} ${(s.direction||'long').toUpperCase()} — ${s.strategy}`));
    }else{
      sf.innerHTML='<div class="empty-state"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>Сигналов пока нет.<br><span class="text-xs">Сканер обновляется каждые 30 секунд.</span></div>';
    }

    // Recent trades (from bots)
    const bots=await API.getBots().catch(()=>({bots:[]}));
    const rt=document.getElementById('recentTrades');
    if(bots.bots&&bots.bots.length){
      let allTrades=[];
      for(const bot of bots.bots.slice(0,5)){
        try{
          const t=await API.getBotTrades(bot.id);
          if(t.trades)allTrades=allTrades.concat(t.trades.map(tr=>({...tr,botName:bot.name,symbol:bot.symbol})));
        }catch(_){}
      }
      if(allTrades.length){
        rt.innerHTML='<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-xs text-slate-500 uppercase"><th class="text-left p-3">Дата</th><th class="text-left p-3">Пара</th><th class="text-left p-3">Тип</th><th class="text-left p-3">Вход</th><th class="text-left p-3">PnL</th></tr></thead><tbody>'+allTrades.slice(0,10).map(t=>`<tr class="border-t border-slate-800/50"><td class="p-3 text-slate-400 text-xs">${t.opened_at||'—'}</td><td class="p-3 font-medium">${t.symbol||'—'}</td><td class="p-3"><span class="text-xs px-2 py-0.5 rounded-full ${t.trade_type==='long'?'bg-green-500/15 text-green-400':'bg-red-500/15 text-red-400'}">${(t.trade_type||'—').toUpperCase()}</span></td><td class="p-3 mono">${t.entry_price||'—'}</td><td class="p-3 mono ${(t.pnl||0)>=0?'text-green-400':'text-red-400'}">${t.pnl?'$'+t.pnl:'—'}</td></tr>`).join('')+'</tbody></table></div>';
      }else{
        rt.innerHTML='<div class="empty-state"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6m18-2V5a2 2 0 00-2-2h-2a2 2 0 00-2 2v14"/></svg>Сделок пока нет.<br><span class="text-xs">Создайте бота чтобы начать торговлю.</span></div>';
      }
    }else{
      rt.innerHTML='<div class="empty-state"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a4 4 0 014 4v1h2a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V9a2 2 0 012-2h2V6a4 4 0 014-4z"/></svg>Нет ботов.<br><span class="text-xs"><a href="bots.html" class="text-indigo-400 hover:underline">Создать первого бота</a></span></div>';
    }

    addNotif('system','Дашборд загружен');
  }catch(e){
    console.error('Dashboard load error:',e);
    addNotif('error','Ошибка загрузки: '+e.message);
  }
}

async function buildChart(days){
  const ctx=document.getElementById('equityChart');
  if(eChart)eChart.destroy();

  // Try to load real trades
  let trades=[];
  try{
    const bots=await API.getBots().catch(()=>({bots:[]}));
    for(const bot of (bots.bots||[]).slice(0,10)){
      try{
        const t=await API.getBotTrades(bot.id);
        if(t.trades)trades=trades.concat(t.trades);
      }catch(_){}
    }
  }catch(_){}

  // Build equity curve from real trades
  if(trades.length>0){
    trades.sort((a,b)=>new Date(a.closed_at||a.opened_at)-new Date(b.closed_at||b.opened_at));
    const cutoff=new Date(Date.now()-days*86400000);
    const filtered=trades.filter(t=>new Date(t.closed_at||t.opened_at)>=cutoff);
    let balance=0;
    const points=[{date:'Start',value:0}];
    filtered.forEach(t=>{
      balance+=(t.pnl||0);
      const d=new Date(t.closed_at||t.opened_at);
      points.push({date:(d.getMonth()+1)+'/'+d.getDate(),value:+balance.toFixed(2)});
    });
    eChart=new Chart(ctx,{type:'line',data:{labels:points.map(p=>p.date),datasets:[{data:points.map(p=>p.value),borderColor:'#818CF8',backgroundColor:function(c){const g=c.chart.ctx.createLinearGradient(0,0,0,300);g.addColorStop(0,'rgba(79,70,229,.3)');g.addColorStop(1,'rgba(79,70,229,0)');return g},fill:true,tension:.4,pointRadius:2,pointBackgroundColor:'#818CF8',borderWidth:2}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#475569',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#475569',font:{size:10},callback:v=>'$'+v.toLocaleString()},grid:{color:'rgba(30,41,59,.3)'}}}}});
  }else{
    // No trades — show empty chart with message
    eChart=new Chart(ctx,{type:'line',data:{labels:[''],datasets:[{data:[0],borderColor:'rgba(129,140,248,.2)',borderWidth:1,pointRadius:0}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}}}});
    // Overlay text
    const parent=ctx.parentElement;
    if(!parent.querySelector('.chart-empty')){
      const msg=document.createElement('div');
      msg.className='chart-empty';
      msg.style.cssText='position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#64748b;font-size:.85rem;pointer-events:none';
      msg.innerHTML='<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.3;margin-bottom:8px"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 5-5"/></svg>Нет данных для графика<br><span style="font-size:.7rem;margin-top:4px">Создайте бота и начните торговать</span>';
      parent.style.position='relative';
      parent.appendChild(msg);
    }
  }
}
function updateChart(d){buildChart(d)}
buildChart(7);
