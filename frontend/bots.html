<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>CHM Finance — Боты</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css"/>
  <style>body{background:#070b14;color:#f1f5f9;font-family:'Inter',sans-serif}.toggle{position:relative;width:44px;height:24px;background:#1e293b;border-radius:12px;cursor:pointer;transition:.2s}.toggle.on{background:#10b981}.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.2s}.toggle.on::after{transform:translateX(20px)}</style>
</head>
<body>
<!-- Same sidebar as dashboard - abbreviated for maintainability -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">CHM<span>.</span></div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="sidebar-link" data-page="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Дашборд</a>
    <a href="bots.html" class="sidebar-link active" data-page="bots"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 014 4v1h2a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V9a2 2 0 012-2h2V6a4 4 0 014-4z"/></svg>Боты</a>
    <a href="signals.html" class="sidebar-link" data-page="signals"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>Сигналы</a>
    <a href="backtests.html" class="sidebar-link" data-page="backtests"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6m6 0h10"/></svg>Бэктесты</a>
    <a href="wallet.html" class="sidebar-link" data-page="wallet"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12V7H5a2 2 0 010-4h14v4M3 5v14a2 2 0 002 2h16v-5"/></svg>Биржи</a>
    <a href="settings.html" class="sidebar-link" data-page="settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>Настройки</a>
  </nav>
  <div class="sidebar-footer"><button onclick="Auth.logout()" class="sidebar-link" style="color:#f87171"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Выйти</button></div>
</aside>
<header class="topbar"><div class="flex items-center gap-4"><button id="sidebar-toggle" class="lg:hidden" style="background:none;border:none;color:#94a3b8;cursor:pointer"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button><h1 class="text-xl font-bold">Мои боты</h1></div><div class="topbar-actions"><div class="topbar-user"><div class="topbar-avatar">U</div></div></div></header>

<main class="main-content">
  <!-- Header -->
  <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
    <div class="flex gap-4 text-sm" id="botSummary">
      <span class="text-slate-400">Всего: <strong class="text-white" id="sumTotal">—</strong></span>
      <span class="text-slate-400">Активных: <strong class="text-green-400" id="sumActive">—</strong></span>
      <span class="text-slate-400">PnL: <strong id="sumPnl" class="text-slate-400">—</strong></span>
    </div>
    <button onclick="document.getElementById('createModal').style.display='flex'" class="btn-primary px-5 py-2.5 rounded-xl text-sm font-semibold" style="background:linear-gradient(135deg,#4F46E5,#7C3AED);border:none;color:#fff;cursor:pointer;box-shadow:0 0 20px rgba(79,70,229,.3)">+ Создать бота</button>
  </div>

  <!-- Filter -->
  <div class="flex flex-wrap gap-3 mb-6">
    <select class="bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-300 outline-none"><option>Все биржи</option><option>Bybit</option><option>Binance</option><option>BingX</option></select>
    <select class="bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-300 outline-none"><option>Все стратегии</option><option>SMC</option><option>Gerchik</option><option>Scalping</option></select>
    <select class="bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-300 outline-none"><option>Все статусы</option><option>Активные</option><option>Остановлены</option></select>
  </div>

  <!-- Bot Cards — loaded from API -->
  <div class="grid md:grid-cols-2 xl:grid-cols-3 gap-4" id="botGrid">
    <div class="card" style="padding:40px;text-align:center;color:#64748b"><div style="margin-bottom:8px">Загрузка ботов...</div></div>
  </div>
</main>

<!-- CREATE BOT MODAL -->
<div id="createModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:100;align-items:center;justify-content:center">
  <div class="card" style="width:100%;max-width:500px;margin:16px;max-height:90vh;overflow-y:auto">
    <div class="flex items-center justify-between mb-6"><h2 class="text-xl font-bold">Создать бота</h2><button onclick="document.getElementById('createModal').style.display='none'" class="text-slate-400 hover:text-white text-xl">&times;</button></div>
    <form id="createBotForm" class="space-y-4">
      <!-- Основные -->
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-xs text-slate-500 block mb-1">Имя</label><input name="name" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none" placeholder="BTC Scalper"/></div>
        <div><label class="text-xs text-slate-500 block mb-1">Пара</label><input name="symbol" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none" placeholder="BTCUSDT"/></div>
      </div>
      <div class="grid grid-cols-3 gap-3">
        <div><label class="text-xs text-slate-500 block mb-1">Биржа</label><select name="exchangeName" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"><option value="bybit">Bybit</option><option value="binance">Binance</option><option value="bingx">BingX</option><option value="okx">OKX</option></select></div>
        <div><label class="text-xs text-slate-500 block mb-1">Стратегия</label><select name="strategyType" id="stratSelect" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none" onchange="showStratParams()"><option value="levels">Levels</option><option value="smc">SMC</option><option value="gerchik">Gerchik</option><option value="scalping">Scalping</option></select></div>
        <div><label class="text-xs text-slate-500 block mb-1">Таймфрейм</label><select name="timeframe" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"><option>1H</option><option>15m</option><option>4H</option><option>1D</option></select></div>
      </div>
      <div class="grid grid-cols-3 gap-3">
        <div><label class="text-xs text-slate-500 block mb-1">Депозит ($)</label><input name="positionSizeUsd" type="number" value="100" min="10" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
        <div><label class="text-xs text-slate-500 block mb-1">Leverage</label><input name="leverage" type="number" value="10" min="1" max="125" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
        <div><label class="text-xs text-slate-500 block mb-1">Направление</label><select name="direction" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"><option value="both">Long + Short</option><option value="long">Только Long</option><option value="short">Только Short</option></select></div>
      </div>

      <!-- Strategy-specific params -->
      <div class="text-xs text-slate-500 font-semibold uppercase tracking-wider mt-3">Параметры стратегии</div>
      <div id="stratParams"></div>

      <!-- Risk Management -->
      <div class="text-xs text-slate-500 font-semibold uppercase tracking-wider mt-3">Риск-менеджмент</div>
      <div class="grid grid-cols-4 gap-3">
        <div><label class="text-xs text-slate-500 block mb-1">Stop Loss %</label><input name="stopLossPct" type="number" step="0.1" value="1.5" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
        <div><label class="text-xs text-slate-500 block mb-1">Take Profit %</label><input name="takeProfitPct" type="number" step="0.1" value="3" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
        <div><label class="text-xs text-slate-500 block mb-1">Trailing Stop</label><select name="trailingStop" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"><option value="0">Выкл</option><option value="1">Вкл</option></select></div>
        <div><label class="text-xs text-slate-500 block mb-1">Макс. сделок</label><input name="maxTrades" type="number" value="5" min="1" max="50" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
      </div>
      <div class="grid grid-cols-3 gap-3 mt-2">
        <div><label class="text-xs text-slate-500 block mb-1">Лимит потерь/день %</label><input name="dailyLoss" type="number" step="0.5" value="5" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
        <div><label class="text-xs text-slate-500 block mb-1">Фильтр тренда</label><select name="trendFilter" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"><option value="1">EMA 200 вкл</option><option value="0">Выкл</option></select></div>
        <div><label class="text-xs text-slate-500 block mb-1">Режим</label><select name="mode" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"><option value="auto">Авто</option><option value="confirm">С подтверждением</option></select></div>
      </div>

      <div class="grid grid-cols-2 gap-3 mt-3">
        <button type="button" onclick="quickBacktest()" class="py-2.5 rounded-xl font-semibold text-sm border border-indigo-500/30 text-indigo-400 bg-indigo-500/5 hover:bg-indigo-500/10 transition">Прогнать бэктест</button>
        <button type="submit" class="py-2.5 rounded-xl font-semibold text-sm text-white" style="background:linear-gradient(135deg,#4F46E5,#7C3AED)">Создать бота</button>
      </div>
      <div id="quickBtResult" class="hidden mt-3 p-3 bg-slate-800/30 rounded-xl text-xs text-slate-300"></div>
    </form>
  </div>
</div>

<script src="app.js"></script>
<script>
if(!Auth.isLoggedIn())window.location.href='/?login=1';
Sidebar.init('bots');

const stratColors={scalping:'cyan',smc:'indigo',gerchik:'orange',levels:'amber'};

async function loadBots(){
  const grid=document.getElementById('botGrid');
  try{
    const res=await API.getBots();
    const bots=res.bots||[];
    const stats=await API.getBotStats().catch(()=>({stats:{}}));
    const s=stats.stats||stats||{};

    // Summary
    document.getElementById('sumTotal').textContent=s.totalBots||bots.length||0;
    document.getElementById('sumActive').textContent=s.activeBots||0;
    const pnl=+(s.totalPnl||0);
    const pnlEl=document.getElementById('sumPnl');
    pnlEl.textContent=(pnl>=0?'+':'')+('$'+Math.abs(pnl).toFixed(2));
    pnlEl.className=pnl>=0?'text-green-400':'text-red-400';

    if(!bots.length){
      grid.innerHTML='<div class="card" style="padding:48px;text-align:center;color:#64748b;grid-column:1/-1"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 12px;opacity:.3"><path d="M12 2a4 4 0 014 4v1h2a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V9a2 2 0 012-2h2V6a4 4 0 014-4z"/></svg>У вас пока нет ботов<br><span style="font-size:.8rem;margin-top:8px;display:inline-block">Нажмите «Создать бота» чтобы начать</span></div>';
      return;
    }

    grid.innerHTML=bots.map((b,i)=>{
      const sc=stratColors[b.strategy_type]||'slate';
      const active=b.is_active;
      return `<div class="card card-glow" ${!active?'style="opacity:.6"':''}>
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-3"><div class="w-10 h-10 rounded-lg bg-${sc}-500/10 flex items-center justify-center text-sm font-bold text-${sc}-400">B${i+1}</div><div><div class="font-semibold">${b.name}</div><div class="text-xs text-slate-500">${b.exchange_name} &middot; ${b.symbol}</div></div></div>
          <div class="toggle ${active?'on':''}" onclick="toggleBotState(${b.id},${!active})"></div>
        </div>
        <div class="flex items-center gap-2 mb-3"><span class="text-xs px-2 py-0.5 rounded-full bg-${sc}-500/15 text-${sc}-400">${b.strategy_type}</span><span class="text-xs px-2 py-0.5 rounded-full ${active?'bg-green-500/15 text-green-400':'bg-slate-500/15 text-slate-400'}">${active?'Active':'Stopped'}</span></div>
        <div class="text-xs text-slate-500">Leverage: ${b.leverage||1}x &middot; Size: $${b.position_size_usd||0} &middot; SL: ${b.stop_loss_pct||0}%</div>
      </div>`;
    }).join('');
  }catch(e){
    grid.innerHTML='<div class="card" style="padding:40px;text-align:center;color:#ef4444">Ошибка: '+e.message+'</div>';
  }
}
loadBots();

async function toggleBotState(id,activate){
  try{await API.toggleBot(id,activate);Toast.success(activate?'Бот запущен':'Бот остановлен');loadBots()}catch(e){Toast.error(e.message)}
}

// Strategy-specific parameters
const STRAT_PARAMS={
  levels:`<div class="grid grid-cols-3 gap-3 mt-2">
    <div><label class="text-xs text-slate-500 block mb-1">Pivot сила</label><input name="sp_pivot" type="number" value="7" min="3" max="15" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
    <div><label class="text-xs text-slate-500 block mb-1">Мин. R:R</label><input name="sp_minRR" type="number" step="0.1" value="1.5" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
    <div><label class="text-xs text-slate-500 block mb-1">Макс. дист. %</label><input name="sp_maxDist" type="number" step="0.1" value="1.5" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
  </div><div class="grid grid-cols-3 gap-3 mt-2">
    <div><label class="text-xs text-slate-500 block mb-1">Зона %</label><input name="sp_zone" type="number" step="0.1" value="0.7" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
    <div><label class="text-xs text-slate-500 block mb-1">EMA быстрая</label><input name="sp_emaFast" type="number" value="50" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
    <div><label class="text-xs text-slate-500 block mb-1">EMA медленная</label><input name="sp_emaSlow" type="number" value="200" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
  </div><div class="grid grid-cols-4 gap-3 mt-2">
    <div><label class="text-xs text-slate-500 block mb-1">RSI перекуп.</label><input name="sp_rsiOB" type="number" value="65" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
    <div><label class="text-xs text-slate-500 block mb-1">RSI перепрод.</label><input name="sp_rsiOS" type="number" value="35" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
    <div><label class="text-xs text-slate-500 block mb-1">Макс. тестов</label><input name="sp_maxTests" type="number" value="4" min="1" max="10" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
    <div><label class="text-xs text-slate-500 block mb-1">HTF фильтр</label><select name="sp_htf" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"><option value="0">Выкл</option><option value="1">Вкл</option></select></div>
  </div><div class="flex flex-wrap gap-4 mt-2 text-xs">
    <label class="flex items-center gap-1.5 text-slate-400"><input type="checkbox" name="sp_rsiFilter" checked class="accent-violet-500"/> RSI фильтр</label>
    <label class="flex items-center gap-1.5 text-slate-400"><input type="checkbox" name="sp_volFilter" checked class="accent-violet-500"/> Объём фильтр</label>
    <label class="flex items-center gap-1.5 text-slate-400"><input type="checkbox" name="sp_patternFilter" checked class="accent-violet-500"/> Паттерн фильтр</label>
  </div>`,
  smc:`<div class="grid grid-cols-3 gap-3 mt-2">
    <div><label class="text-xs text-slate-500 block mb-1">Мин. подтверждений</label><input name="sp_minConf" type="number" value="2" min="1" max="5" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
    <div><label class="text-xs text-slate-500 block mb-1">Мин. R:R</label><input name="sp_minRR" type="number" step="0.1" value="1.5" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
    <div><label class="text-xs text-slate-500 block mb-1">Возраст OB (баров)</label><input name="sp_obAge" type="number" value="80" min="10" max="200" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
  </div><div class="grid grid-cols-3 gap-3 mt-2">
    <div><label class="text-xs text-slate-500 block mb-1">SL буфер %</label><input name="sp_slBuffer" type="number" step="0.1" value="0.5" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
    <div><label class="text-xs text-slate-500 block mb-1">Swing Lookback</label><input name="sp_swingLB" type="number" value="10" min="5" max="30" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
    <div><label class="text-xs text-slate-500 block mb-1">OB тело мульт.</label><input name="sp_obMult" type="number" step="0.1" value="1.8" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
  </div><div class="flex flex-wrap gap-4 mt-2 text-xs">
    <label class="flex items-center gap-1.5 text-slate-400"><input type="checkbox" name="sp_fvg" checked class="accent-violet-500"/> FVG (Fair Value Gap)</label>
    <label class="flex items-center gap-1.5 text-slate-400"><input type="checkbox" name="sp_choch" checked class="accent-violet-500"/> CHoCH (смена структуры)</label>
    <label class="flex items-center gap-1.5 text-slate-400"><input type="checkbox" name="sp_bos" checked class="accent-violet-500"/> BOS (пробой структуры)</label>
  </div>`,
  gerchik:`<div class="grid grid-cols-3 gap-3 mt-2">
    <div><label class="text-xs text-slate-500 block mb-1">TP1 (R)</label><input name="sp_tp1r" type="number" step="0.5" value="3.0" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
    <div><label class="text-xs text-slate-500 block mb-1">TP2 (R)</label><input name="sp_tp2r" type="number" step="0.5" value="4.0" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
    <div><label class="text-xs text-slate-500 block mb-1">Мин. R:R</label><input name="sp_minRR" type="number" step="0.1" value="2.5" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
  </div><div class="grid grid-cols-3 gap-3 mt-2">
    <div><label class="text-xs text-slate-500 block mb-1">Pivot сила</label><input name="sp_pivot" type="number" value="5" min="3" max="15" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
    <div><label class="text-xs text-slate-500 block mb-1">Lookback (баров)</label><input name="sp_lookback" type="number" value="50" min="20" max="200" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
    <div><label class="text-xs text-slate-500 block mb-1">Люфт %</label><input name="sp_buffer" type="number" step="0.05" value="0.20" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
  </div><div class="flex flex-wrap gap-4 mt-2 text-xs">

function showStratParams(){
  const s=document.getElementById('stratSelect').value;
  document.getElementById('stratParams').innerHTML=STRAT_PARAMS[s]||'';
}
showStratParams();

// Collect all strategy params into JSON
function collectStratParams(){
  const form=document.getElementById('createBotForm');
  const fd=new FormData(form);
  const params={};
  for(const[k,v] of fd.entries()){if(k.startsWith('sp_'))params[k.replace('sp_','')]=isNaN(v)?v:+v}
  // Checkboxes (unchecked not in FormData)
  form.querySelectorAll('input[type=checkbox][name^=sp_]').forEach(cb=>{params[cb.name.replace('sp_','')]=cb.checked});
  return params;
}

// Quick backtest from bot form
async function quickBacktest(){
  const form=document.getElementById('createBotForm');
  const fd=new FormData(form);
  const res=document.getElementById('quickBtResult');
  res.className='mt-3 p-3 bg-slate-800/30 rounded-xl text-xs text-slate-300';
  res.textContent='Запуск бэктеста...';
  try{
    const sp=collectStratParams();
    const data={name:fd.get('symbol')+' '+fd.get('strategyType'),symbol:fd.get('symbol'),exchangeName:fd.get('exchangeName'),timeframe:fd.get('timeframe')||'1H',startDate:'2025-01-01',endDate:'2026-01-01',initialCapital:+fd.get('positionSizeUsd')*+fd.get('leverage'),strategyConfig:JSON.stringify({strategy:fd.get('strategyType'),direction:fd.get('direction')||'both',trendFilter:fd.get('trendFilter')==='1',params:sp})};
    const r=await API.createBacktest(data);
    // Poll for result
    let tries=0;
    const poll=setInterval(async()=>{
      tries++;
      if(tries>20){clearInterval(poll);res.textContent='Таймаут — проверьте на странице Бэктесты';return}
      try{
        const bt=await API.getBacktest(r.backtest?.id||r.id);
        if(bt.status==='completed'){
          clearInterval(poll);
          const d=JSON.parse(bt.results||'{}');
          res.innerHTML=`<div class="grid grid-cols-4 gap-3 text-center"><div><div class="text-slate-500">PnL</div><div class="font-bold ${Number(d.totalPnl||0)>=0?'text-green-400':'text-red-400'}">${Number(d.totalPnl||0)>=0?'+':''}$${Math.abs(Number(d.totalPnl||0)).toFixed(0)}</div></div><div><div class="text-slate-500">WR</div><div class="font-bold">${Number(d.winRate||0).toFixed(0)}%</div></div><div><div class="text-slate-500">Trades</div><div class="font-bold">${d.totalTrades||0}</div></div><div><div class="text-slate-500">Max DD</div><div class="font-bold text-red-400">${Number(d.maxDrawdown||0).toFixed(1)}%</div></div></div>`;
        }else if(bt.status==='failed'){
          clearInterval(poll);
          res.textContent='Ошибка бэктеста';res.style.color='#ef4444';
        }
      }catch(_){}
    },1500);
  }catch(e){res.textContent='Ошибка: '+e.message;res.style.color='#ef4444'}
}

document.getElementById('createBotForm')?.addEventListener('submit',async e=>{
  e.preventDefault();const fd=new FormData(e.target);const data=Object.fromEntries(fd.entries());
  data.leverage=+data.leverage;data.positionSizeUsd=+data.positionSizeUsd;data.stopLossPct=+data.stopLossPct;data.takeProfitPct=+data.takeProfitPct;
  try{await API.createBot(data);Toast.success('Бот создан!');document.getElementById('createModal').style.display='none';loadBots()}catch(err){Toast.error(err.message)}
});
</script>
