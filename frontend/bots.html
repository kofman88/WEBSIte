<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>CHM Finance — Боты</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css"/>
  <style>body{background:#070b14;color:#f1f5f9;font-family:'Inter',sans-serif}.toggle{position:relative;width:44px;height:24px;background:#1e293b;border-radius:12px;cursor:pointer;transition:.2s}.toggle.on{background:#10b981}.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.2s}.toggle.on::after{transform:translateX(20px)}html.light body{background:#f8f9fc;color:#1e293b}html.light .sidebar{background:#f0f2f7;border-color:rgba(0,0,0,.06)}html.light .sidebar-link{color:#64748b}html.light .sidebar-link.active{color:#4f46e5;background:rgba(79,70,229,.06)}html.light .topbar{background:rgba(248,249,252,.85)!important}html.light .card,.light .stat-card{background:rgba(255,255,255,.5)!important;border-color:rgba(0,0,0,.06)!important}html.light h1,html.light h2,html.light .font-bold,html.light .font-semibold{color:#0f172a!important}html.light .text-white{color:#1e293b!important}html.light .text-slate-400,html.light .text-slate-500{color:#64748b!important}</style>
<script>if(localStorage.getItem("chm_theme")==="light")document.documentElement.classList.add("light")</script>
</head>
<body>
<!-- Same sidebar as dashboard - abbreviated for maintainability -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">CHM<span>.</span></div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="sidebar-link" data-page="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Дашборд</a>
    <a href="bots.html" class="sidebar-link active" data-page="bots"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 014 4v1h2a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V9a2 2 0 012-2h2V6a4 4 0 014-4z"/></svg>Боты</a>
    <a href="signals.html" class="sidebar-link" data-page="signals"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>Сигналы</a>
    <a href="backtests.html" class="sidebar-link" data-page="backtests"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6m6 0h10"/></svg>Бэктесты</a>
    <a href="wallet.html" class="sidebar-link" data-page="wallet"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12V7H5a2 2 0 010-4h14v4M3 5v14a2 2 0 002 2h16v-5"/></svg>Биржи</a>
    <a href="settings.html" class="sidebar-link" data-page="settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>Настройки</a>
  <a href="academy/" class="sidebar-link" data-page="academy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>Академия</a>
  </nav>
  <div class="sidebar-footer"><button onclick="Auth.logout()" class="sidebar-link" style="color:#f87171"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Выйти</button></div>
</aside>
<header class="topbar"><div class="flex items-center gap-4"><button id="sidebar-toggle" class="lg:hidden" style="background:none;border:none;color:#94a3b8;cursor:pointer"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button><h1 class="text-xl font-bold">Мои боты</h1></div><div class="topbar-actions"><button onclick="document.documentElement.classList.toggle('light');localStorage.setItem('chm_theme',document.documentElement.classList.contains('light')?'light':'dark');this.textContent=document.documentElement.classList.contains('light')?'☀️':'🌙')" class="text-sm w-8 h-8 flex items-center justify-center rounded-lg border border-slate-700/50 hover:bg-white/[.03]">🌙</button><div class="topbar-user"><div class="topbar-avatar">U</div></div></div></header>

<main class="main-content">
  <!-- Header -->
  <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
    <div class="flex gap-4 text-sm" id="botSummary">
      <span class="text-slate-400">Всего: <strong class="text-white" id="sumTotal">—</strong></span>
      <span class="text-slate-400">Активных: <strong class="text-green-400" id="sumActive">—</strong></span>
      <span class="text-slate-400">PnL: <strong id="sumPnl" class="text-slate-400">—</strong></span>
    </div>
    <button onclick="document.getElementById('createModal').style.display='flex'" class="btn-primary px-5 py-2.5 rounded-xl text-sm font-semibold" style="background:linear-gradient(135deg,#4F46E5,#7C3AED);border:none;color:#fff;cursor:pointer;box-shadow:0 0 20px rgba(79,70,229,.3)">+ Создать бота</button>
  </div>

  <!-- Filter -->
  <div class="flex flex-wrap gap-3 mb-6">
    <select class="bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-300 outline-none"><option>Все биржи</option><option>Bybit</option><option>Binance</option><option>BingX</option></select>
    <select class="bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-300 outline-none"><option>Все стратегии</option><option>SMC</option><option>Gerchik</option><option>Scalping</option></select>
    <select class="bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-300 outline-none"><option>Все статусы</option><option>Активные</option><option>Остановлены</option></select>
  </div>

  <!-- Bot Cards — loaded from API -->
  <div class="grid md:grid-cols-2 xl:grid-cols-3 gap-4" id="botGrid">
    <div class="card" style="padding:40px;text-align:center;color:#64748b"><div style="margin-bottom:8px">Загрузка ботов...</div></div>
  </div>
</main>

<!-- CREATE BOT MODAL -->
<div id="createModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:100;align-items:center;justify-content:center">
  <div class="card" style="width:100%;max-width:500px;margin:16px;max-height:90vh;overflow-y:auto">
    <div class="flex items-center justify-between mb-6"><h2 class="text-xl font-bold">Создать бота</h2><button onclick="document.getElementById('createModal').style.display='none'" class="text-slate-400 hover:text-white text-xl">&times;</button></div>
    <form id="createBotForm" class="space-y-4">
      <!-- Основные -->
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-xs text-slate-500 block mb-1">Имя</label><input name="name" id="botNameInput" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none" value="BTC Levels"/></div>
        <div><label class="text-xs text-slate-500 block mb-1">Пара</label><input name="symbol" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none" placeholder="BTCUSDT"/></div>
      </div>
      <div class="grid grid-cols-3 gap-3">
        <div><label class="text-xs text-slate-500 block mb-1">Биржа</label><select name="exchangeName" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"><option value="bybit">Bybit</option><option value="binance">Binance</option><option value="bingx">BingX</option><option value="okx">OKX</option></select></div>
        <div><label class="text-xs text-slate-500 block mb-1">Стратегия</label><select name="strategyType" id="stratSelect" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none" onchange="showStratParams()"><option value="levels">Levels</option><option value="smc">SMC</option><option value="gerchik">Gerchik</option><option value="scalping">Scalping</option></select></div>
        <div><label class="text-xs text-slate-500 block mb-1">Таймфрейм</label><select name="timeframe" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"><option>1H</option><option>15m</option><option>4H</option><option>1D</option></select></div>
      </div>
      <div class="grid grid-cols-3 gap-3">
        <div><label class="text-xs text-slate-500 block mb-1">Депозит ($)</label><input name="positionSizeUsd" type="number" value="100" min="10" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
        <div><label class="text-xs text-slate-500 block mb-1">Leverage</label><input name="leverage" type="number" value="10" min="1" max="125" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
        <div><label class="text-xs text-slate-500 block mb-1">Направление</label><select name="direction" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"><option value="both">Long + Short</option><option value="long">Только Long</option><option value="short">Только Short</option></select></div>
      </div>

      <!-- Strategy-specific params -->
      <div class="text-xs text-slate-500 font-semibold uppercase tracking-wider mt-3">Параметры стратегии</div>
      <div id="stratParams"></div>

      <!-- Risk Management -->
      <div class="text-xs text-slate-500 font-semibold uppercase tracking-wider mt-3">Риск-менеджмент</div>
      <div class="grid grid-cols-4 gap-3">
        <div><label class="text-xs text-slate-500 block mb-1">Stop Loss %</label><input name="stopLossPct" type="number" step="0.1" value="1.5" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
        <div><label class="text-xs text-slate-500 block mb-1">Take Profit %</label><input name="takeProfitPct" type="number" step="0.1" value="3" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
        <div><label class="text-xs text-slate-500 block mb-1">Trailing Stop</label><select name="trailingStop" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"><option value="0">Выкл</option><option value="1">Вкл</option></select></div>
        <div><label class="text-xs text-slate-500 block mb-1">Макс. сделок</label><input name="maxTrades" type="number" value="5" min="1" max="50" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
      </div>
      <div class="grid grid-cols-3 gap-3 mt-2">
        <div><label class="text-xs text-slate-500 block mb-1">Лимит потерь/день %</label><input name="dailyLoss" type="number" step="0.5" value="5" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
        <div><label class="text-xs text-slate-500 block mb-1">Фильтр тренда</label><select name="trendFilter" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"><option value="1">EMA 200 вкл</option><option value="0">Выкл</option></select></div>
        <div><label class="text-xs text-slate-500 block mb-1">Режим</label><select name="mode" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"><option value="auto">Авто</option><option value="confirm">С подтверждением</option></select></div>
      </div>

      <div class="grid grid-cols-2 gap-3 mt-3">
        <div><label class="text-xs text-slate-500 block mb-1">Начало бэктеста</label><input name="btStart" type="date" value="2025-01-01" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
        <div><label class="text-xs text-slate-500 block mb-1">Конец бэктеста</label><input name="btEnd" type="date" value="2026-04-11" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
      </div>
      <div class="grid grid-cols-2 gap-3 mt-3">
        <button type="button" onclick="quickBacktest()" class="py-2.5 rounded-xl font-semibold text-sm border border-indigo-500/30 text-indigo-400 bg-indigo-500/5 hover:bg-indigo-500/10 transition">Прогнать бэктест</button>
        <button type="submit" class="py-2.5 rounded-xl font-semibold text-sm text-white" style="background:linear-gradient(135deg,#4F46E5,#7C3AED)">Создать бота</button>
      </div>
      <div id="quickBtResult" class="hidden mt-3 p-3 bg-slate-800/30 rounded-xl text-xs text-slate-300"></div>
    </form>
  </div>
</div>

<!-- EDIT BOT MODAL -->
<div id="editModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:100;align-items:center;justify-content:center">
  <div class="card" style="width:100%;max-width:450px;margin:16px;max-height:90vh;overflow-y:auto">
    <div class="flex items-center justify-between mb-4"><h2 class="text-lg font-bold">Редактировать бота</h2><button onclick="document.getElementById('editModal').style.display='none'" class="text-slate-400 hover:text-white text-xl">&times;</button></div>
    <form id="editBotForm" class="space-y-3">
      <input type="hidden" name="editId" id="editId"/>
      <div><label class="text-xs text-slate-500 block mb-1">Имя</label><input name="name" id="editName" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-xs text-slate-500 block mb-1">Leverage</label><input name="leverage" id="editLev" type="number" min="1" max="125" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
        <div><label class="text-xs text-slate-500 block mb-1">Размер ($)</label><input name="positionSizeUsd" id="editSize" type="number" min="10" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-xs text-slate-500 block mb-1">Stop Loss %</label><input name="stopLossPct" id="editSL" type="number" step="0.1" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
        <div><label class="text-xs text-slate-500 block mb-1">Take Profit %</label><input name="takeProfitPct" id="editTP" type="number" step="0.1" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
      </div>
      <button type="submit" class="w-full py-2.5 rounded-xl font-semibold text-sm text-white" style="background:linear-gradient(135deg,#4F46E5,#7C3AED)">Сохранить</button>
    </form>
  </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div id="deleteModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:100;align-items:center;justify-content:center">
  <div class="card" style="width:100%;max-width:380px;margin:16px;text-align:center">
    <h2 class="text-lg font-bold mb-2">Удалить бота?</h2>
    <p class="text-sm text-slate-400 mb-4" id="deleteMsg">Это действие нельзя отменить.</p>
    <div class="flex gap-3 justify-center">
      <button onclick="document.getElementById('deleteModal').style.display='none'" class="px-5 py-2 rounded-lg text-sm border border-slate-700 text-slate-400">Отмена</button>
      <button id="deleteConfirmBtn" class="px-5 py-2 rounded-lg text-sm bg-red-500 text-white font-semibold">Удалить</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
if(!Auth.isLoggedIn())window.location.href='/?login=1';
Sidebar.init('bots');

const stratColors={scalping:'cyan',smc:'indigo',gerchik:'orange',levels:'amber'};

async function loadBots(){
  const grid=document.getElementById('botGrid');
  try{
    const res=await API.getBots();
    const bots=res.bots||[];
    const stats=await API.getBotStats().catch(()=>({stats:{}}));
    const s=stats.stats||stats||{};

    // Summary
    document.getElementById('sumTotal').textContent=s.totalBots||bots.length||0;
    document.getElementById('sumActive').textContent=s.activeBots||0;
    const pnl=+(s.totalPnl||0);
    const pnlEl=document.getElementById('sumPnl');
    pnlEl.textContent=(pnl>=0?'+':'')+('$'+Math.abs(pnl).toFixed(2));
    pnlEl.className=pnl>=0?'text-green-400':'text-red-400';

    if(!bots.length){
      grid.innerHTML='<div class="card" style="padding:48px;text-align:center;color:#64748b;grid-column:1/-1"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 12px;opacity:.3"><path d="M12 2a4 4 0 014 4v1h2a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V9a2 2 0 012-2h2V6a4 4 0 014-4z"/></svg>У вас пока нет ботов<br><span style="font-size:.8rem;margin-top:8px;display:inline-block">Нажмите «Создать бота» чтобы начать</span></div>';
      return;
    }

    grid.innerHTML=bots.map((b,i)=>{
      const sc=stratColors[b.strategy_type]||'slate';
      const active=b.is_active;
      return `<div class="card card-glow" ${!active?'style="opacity:.6"':''}>
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-3"><div class="w-10 h-10 rounded-lg bg-${sc}-500/10 flex items-center justify-center text-sm font-bold text-${sc}-400">B${i+1}</div><div><div class="font-semibold">${b.name}</div><div class="text-xs text-slate-500">${b.exchange_name} &middot; ${b.symbol}</div></div></div>
          <div class="toggle ${active?'on':''}" onclick="toggleBotState(${b.id},${!active})"></div>
        </div>
        <div class="flex items-center gap-2 mb-3"><span class="text-xs px-2 py-0.5 rounded-full bg-${sc}-500/15 text-${sc}-400">${b.strategy_type}</span><span class="text-xs px-2 py-0.5 rounded-full ${active?'bg-green-500/15 text-green-400':'bg-slate-500/15 text-slate-400'}">${active?'Active':'Stopped'}</span></div>
        <div class="text-xs text-slate-500 mt-2">Leverage: ${b.leverage||1}x &middot; Size: $${b.position_size_usd||0} &middot; SL: ${b.stop_loss_pct||0}%</div>
        <div class="flex gap-2 mt-3">
          <a href="bot-detail.html?id=${b.id}" class="text-xs px-3 py-1.5 rounded-lg bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 hover:text-indigo-300 transition">Открыть</a>
          <button onclick="editBot(${b.id})" class="text-xs px-3 py-1.5 rounded-lg bg-slate-800/50 border border-slate-700 text-slate-400 hover:text-white transition">Редактировать</button>
          <button onclick="deleteBot(${b.id},'${b.name}')" class="text-xs px-3 py-1.5 rounded-lg bg-red-500/5 border border-red-500/20 text-red-400 hover:text-red-300 transition">Удалить</button>
        </div>
      </div>`;
    }).join('');
  }catch(e){
    grid.innerHTML='<div class="card" style="padding:40px;text-align:center;color:#ef4444">Ошибка: '+e.message+'</div>';
  }
}
loadBots();

async function toggleBotState(id,activate){
  try{await API.toggleBot(id,activate);Toast.success(activate?'Бот запущен':'Бот остановлен');loadBots()}catch(e){Toast.error(e.message)}
}

// Edit bot
async function editBot(id){
  try{
    const r=await API.getBot(id);
    const b=r.bot||r;
    document.getElementById('editId').value=b.id;
    document.getElementById('editName').value=b.name||'';
    document.getElementById('editLev').value=b.leverage||10;
    document.getElementById('editSize').value=b.position_size_usd||100;
    document.getElementById('editSL').value=b.stop_loss_pct||1.5;
    document.getElementById('editTP').value=b.take_profit_pct||3;
    document.getElementById('editModal').style.display='flex';
  }catch(e){Toast.error(e.message)}
}
document.getElementById('editBotForm')?.addEventListener('submit',async e=>{
  e.preventDefault();
  const id=document.getElementById('editId').value;
  const fd=new FormData(e.target);
  try{
    await API.updateBot(id,{name:fd.get('name'),leverage:+fd.get('leverage'),positionSizeUsd:+fd.get('positionSizeUsd'),stopLossPct:+fd.get('stopLossPct'),takeProfitPct:+fd.get('takeProfitPct')});
    Toast.success('Бот обновлён');
    document.getElementById('editModal').style.display='none';
    loadBots();
  }catch(err){Toast.error(err.message)}
});

// Delete bot
function deleteBot(id,name){
  document.getElementById('deleteMsg').textContent=`Удалить бота "${name}"? Это действие нельзя отменить.`;
  document.getElementById('deleteConfirmBtn').onclick=async()=>{
    try{await API.deleteBot(id);Toast.success('Бот удалён');document.getElementById('deleteModal').style.display='none';loadBots()}catch(e){Toast.error(e.message)}
  };
  document.getElementById('deleteModal').style.display='flex';
}

// Strategy-specific parameters

// Auto-name bot
function autoName(){
  const sym=document.querySelector('[name=symbol]')?.value||'BTC';
  const strat=document.getElementById('stratSelect')?.value||'levels';
  document.getElementById('botNameInput').value=sym.replace('USDT','')+' '+strat.charAt(0).toUpperCase()+strat.slice(1);
}
document.querySelector('[name=symbol]')?.addEventListener('input',autoName);
document.getElementById('stratSelect')?.addEventListener('change',()=>{autoName();showStratParams()});

function showStratParams(){
  const s=document.getElementById('stratSelect').value;
  document.getElementById('stratParams').innerHTML=STRAT_PARAMS[s]||'';
}
showStratParams();

// Collect all strategy params into JSON
function collectStratParams(){
  const form=document.getElementById('createBotForm');
  const fd=new FormData(form);
  const params={};
  for(const[k,v] of fd.entries()){if(k.startsWith('sp_'))params[k.replace('sp_','')]=isNaN(v)?v:+v}
  // Checkboxes (unchecked not in FormData)
  form.querySelectorAll('input[type=checkbox][name^=sp_]').forEach(cb=>{params[cb.name.replace('sp_','')]=cb.checked});
  return params;
}

// Quick backtest from bot form — uses ALL parameters
async function quickBacktest(){
  const errs=validateBotForm();
  if(errs.length){Toast.error(errs.join('. '));return}
  const form=document.getElementById('createBotForm');
  const fd=new FormData(form);
  const res=document.getElementById('quickBtResult');
  res.className='mt-3 p-3 bg-slate-800/30 rounded-xl text-xs text-slate-300';
  res.textContent='Запуск бэктеста с текущими настройками...';
  const sp=collectStratParams();
  // Add general params to strategy config
  sp.stopLossPct=+fd.get('stopLossPct');
  sp.takeProfitPct=+fd.get('takeProfitPct');
  sp.leverage=+fd.get('leverage');
  sp.trailingStop=fd.get('trailingStop')==='1';
  sp.maxTrades=+fd.get('maxTrades')||5;
  sp.dailyLoss=+fd.get('dailyLoss')||5;
  try{
    const data={name:fd.get('symbol')+' '+fd.get('strategyType'),symbol:fd.get('symbol').toUpperCase(),exchangeName:fd.get('exchangeName'),timeframe:fd.get('timeframe')||'1H',startDate:fd.get('btStart')||'2025-01-01',endDate:fd.get('btEnd')||'2026-01-01',initialCapital:+fd.get('positionSizeUsd')*+fd.get('leverage'),strategyConfig:JSON.stringify({strategy:fd.get('strategyType'),direction:fd.get('direction')||'both',trendFilter:fd.get('trendFilter')==='1',params:sp})};
    const r=await API.createBacktest(data);
    const btId=r.backtest?.id||r.id;
    if(!btId){res.textContent='Бэктест создан — проверьте страницу Бэктесты';return}
    // Poll
    let tries=0;
    const poll=setInterval(async()=>{
      tries++;
      if(tries>15){clearInterval(poll);res.innerHTML='Бэктест выполняется — <a href="backtests.html" class="text-indigo-400 underline">проверьте на странице Бэктесты</a>';return}
      try{
        const bt=await API.getBacktest(btId);
        const st=bt.status||bt.backtest?.status;
        const results=bt.results||bt.backtest?.results;
        if(st==='completed'&&results){
          clearInterval(poll);
          const d=typeof results==='string'?JSON.parse(results):results;
          res.innerHTML=`<div class="grid grid-cols-5 gap-3 text-center"><div><div class="text-slate-500">PnL</div><div class="font-bold ${Number(d.totalPnl||0)>=0?'text-green-400':'text-red-400'}">${Number(d.totalPnl||0)>=0?'+':''}$${Math.abs(Number(d.totalPnl||0)).toFixed(0)}</div></div><div><div class="text-slate-500">WR</div><div class="font-bold">${Number(d.winRate||0).toFixed(0)}%</div></div><div><div class="text-slate-500">Trades</div><div class="font-bold">${d.totalTrades||0}</div></div><div><div class="text-slate-500">Max DD</div><div class="font-bold text-red-400">${Number(d.maxDrawdown||0).toFixed(1)}%</div></div><div><div class="text-slate-500">Sharpe</div><div class="font-bold">${Number(d.sharpeRatio||0).toFixed(2)}</div></div></div>`;
        }else if(st==='failed'){
          clearInterval(poll);res.textContent='Ошибка бэктеста';res.style.color='#ef4444';
        }
      }catch(_){}
    },2000);
  }catch(e){res.textContent='Ошибка: '+e.message;res.style.color='#ef4444'}
}

function validateBotForm(){
  const f=document.getElementById('createBotForm'),fd=new FormData(f),e=[];
  if(!fd.get('name')||fd.get('name').trim().length<2)e.push('Имя: минимум 2 символа');
  if(!fd.get('symbol')||fd.get('symbol').trim().length<3)e.push('Пара: укажите (напр. BTCUSDT)');
  if(+fd.get('positionSizeUsd')<10)e.push('Депозит: минимум $10');
  if(+fd.get('leverage')<1||+fd.get('leverage')>125)e.push('Leverage: от 1 до 125');
  if(+fd.get('stopLossPct')<=0)e.push('Stop Loss: больше 0');
  if(+fd.get('takeProfitPct')<=0)e.push('Take Profit: больше 0');
  if(+fd.get('takeProfitPct')<=+fd.get('stopLossPct'))e.push('Take Profit должен быть > Stop Loss');
  return e;
}
document.getElementById('createBotForm')?.addEventListener('submit',async e=>{
  e.preventDefault();
  const errs=validateBotForm();
  if(errs.length){Toast.error(errs.join('. '));return}
  const fd=new FormData(e.target);
  const data={name:fd.get('name'),exchangeName:fd.get('exchangeName'),symbol:fd.get('symbol').toUpperCase(),strategyType:fd.get('strategyType'),leverage:+fd.get('leverage'),positionSizeUsd:+fd.get('positionSizeUsd'),stopLossPct:+fd.get('stopLossPct'),takeProfitPct:+fd.get('takeProfitPct'),trailingStop:fd.get('trailingStop')==='1'};
  try{await API.createBot(data);Toast.success('Бот создан!');document.getElementById('createModal').style.display='none';loadBots()}catch(err){Toast.error(err.message)}
});
</script>
