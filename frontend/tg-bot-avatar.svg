<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0D0F"/>
      <stop offset="100%" stop-color="#1A1A1E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C850C0"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="bell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.3"/>
  <!-- CHM text -->
  <text x="82" y="310" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="200" fill="#FFFFFF" letter-spacing="-8">CH</text>
  <!-- Orange dot (brand mark) -->
  <circle cx="390" cy="290" r="28" fill="url(#accent)"/>
  <!-- Notification bell icon (small, top-right) -->
  <g transform="translate(360, 80)">
    <path d="M40 10C40 4.5 35.5 0 30 0S20 4.5 20 10c-11 3-18 12-18 24v20l-6 8h68l-6-8V34c0-12-7-21-18-24z" fill="url(#bell)" opacity="0.9"/>
    <circle cx="30" cy="68" r="8" fill="url(#bell)" opacity="0.9"/>
    <!-- Notification dot -->
    <circle cx="48" cy="5" r="10" fill="#00C853"/>
  </g>
  <!-- Subtle glow -->
  <circle cx="390" cy="290" r="60" fill="#FF8C00" opacity="0.08"/>
</svg>
