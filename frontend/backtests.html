<header class="topbar"><div class="flex items-center gap-4"><button id="sidebar-toggle" class="lg:hidden" aria-label="Toggle menu" style="background:none;border:none;color:rgba(255,255,255,.62);cursor:pointer"><svg aria-hidden="true" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button><h1 class="text-xl font-bold">Бэктесты</h1></div><div class="topbar-actions"><button id="shellLang" type="button" class="shell-topbar-btn" title="Language">EN</button><button id="shellTheme" type="button" class="shell-topbar-btn" title="Toggle theme" aria-label="Toggle theme"></button><div class="topbar-user"><div class="topbar-avatar">U</div></div></div></header>

<main class="main-content">
  <!-- Create Form -->
  <div class="card mb-6">
    <h2 class="font-bold mb-4">Новый бэктест</h2>
    <form id="btForm" class="grid md:grid-cols-3 lg:grid-cols-6 gap-4">
      <div><label class="text-xs text-slate-500 block mb-1">Пара</label><input name="symbol" value="BTCUSDT" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
      <div><label class="text-xs text-slate-500 block mb-1">Стратегия</label><select name="strategy" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"><option>scalping</option><option>smc</option><option>gerchik</option></select></div>
      <div><label class="text-xs text-slate-500 block mb-1">Таймфрейм</label><select name="timeframe" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"><option>15m</option><option>1h</option><option>4h</option><option>1d</option></select></div>
      <div><label class="text-xs text-slate-500 block mb-1">Начало</label><input name="startDate" type="date" value="2025-01-01" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
      <div><label class="text-xs text-slate-500 block mb-1">Конец</label><input name="endDate" type="date" value="2025-12-31" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
      <div class="flex items-end"><button type="submit" class="w-full py-2 rounded-lg font-semibold text-white text-sm" style="background:linear-gradient(180deg,#FF7840 0%,#FF5A1F 60%,#C44610 100%);box-shadow:inset 0 1px 1px rgba(255,255,255,.28),inset 0 -1px 3px rgba(0,0,0,.6),0 4px 8px -2px rgba(0,0,0,.6),0 0 0 1px rgba(255,90,31,.35)">Запустить</button></div>
    </form>
  </div>

  <!-- Results Grid -->
  <h2 class="font-bold mb-4">Результаты</h2>
  <div class="grid md:grid-cols-2 gap-4 mb-6" id="btResultsGrid">
    <div class="col-span-full text-center py-12 text-slate-500 text-sm">Загрузка бэктестов…</div>
  </div>
</main>

<script src="app.js"></script>
<script src="shell.js?v=7" defer></script>
<script>
if(!Auth.requireAuth()) throw new Error('noauth');
document.querySelectorAll('.sidebar-link[data-page="backtests"]').forEach(a => a.classList.add('active'));

const resultsGrid = document.getElementById('btResultsGrid');

function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function renderBacktest(bt) {
  const card = document.createElement('div');
  card.className = 'card card-glow';
  card.dataset.btId = bt.id;
  const pnl = bt.results?.totalPnlUsd;
  const pnlClass = pnl > 0 ? 'text-green-400' : pnl < 0 ? 'text-red-400' : 'text-slate-400';
  const statusBadge = bt.status === 'completed'
    ? '<span class="text-xs px-2 py-0.5 rounded-full bg-green-500/15 text-green-400">Completed</span>'
    : bt.status === 'running'
    ? '<span class="text-xs px-2 py-0.5 rounded-full bg-yellow-500/15 text-yellow-400">Running</span>'
    : bt.status === 'failed'
    ? '<span class="text-xs px-2 py-0.5 rounded-full bg-red-500/15 text-red-400">Failed</span>'
    : '<span class="text-xs px-2 py-0.5 rounded-full bg-slate-500/15 text-slate-400">Pending</span>';
  const syms = Array.isArray(bt.symbols) ? bt.symbols.join(', ') : bt.symbols;

  if (bt.status !== 'completed') {
    card.innerHTML = `
      <div class="flex items-center justify-between mb-3">
        <div><div class="font-semibold">${escapeHtml(bt.name)}</div>
        <div class="text-xs text-slate-500">${bt.startDate}–${bt.endDate} · ${escapeHtml(syms)}</div></div>
        ${statusBadge}
      </div>
      <div class="w-full bg-slate-800 rounded-full h-2 mt-4"><div class="bg-indigo-500 h-2 rounded-full" style="width:${bt.progressPct||0}%"></div></div>
      <div class="text-xs text-slate-500 mt-2">${bt.progressPct||0}% complete${bt.errorMessage?'<span class="text-red-400 ml-2">'+escapeHtml(bt.errorMessage)+'</span>':''}</div>`;
    return card;
  }

  const r = bt.results;
  card.innerHTML = `
    <div class="flex items-center justify-between mb-3">
      <div><div class="font-semibold">${escapeHtml(bt.name)}</div>
      <div class="text-xs text-slate-500">${bt.startDate}–${bt.endDate} · ${escapeHtml(syms)}</div></div>
      ${statusBadge}
    </div>
    <div class="grid grid-cols-3 gap-3 text-center text-sm mb-4">
      <div><div class="text-xs text-slate-500">PnL</div><div class="${pnlClass} font-bold">${Fmt.currency(r.totalPnlUsd)}</div></div>
      <div><div class="text-xs text-slate-500">Win Rate</div><div class="font-bold">${r.winRatePct}%</div></div>
      <div><div class="text-xs text-slate-500">Sharpe</div><div class="font-bold">${r.sharpeRatio}</div></div>
    </div>
    <div class="grid grid-cols-3 gap-3 text-center text-sm">
      <div><div class="text-xs text-slate-500">Max DD</div><div class="text-red-400">-${r.maxDrawdownPct}%</div></div>
      <div><div class="text-xs text-slate-500">PF</div><div>${r.profitFactor || '—'}</div></div>
      <div><div class="text-xs text-slate-500">Trades</div><div>${r.totalTrades}</div></div>
    </div>
    <div class="mt-4" style="position:relative;height:140px"><canvas id="btChart${bt.id}"></canvas></div>`;
  setTimeout(() => drawEquityChart('btChart' + bt.id, r.equityCurve), 10);
  return card;
}

function drawEquityChart(canvasId, curve) {
  const el = document.getElementById(canvasId);
  if (!el || !Array.isArray(curve) || !curve.length) return;
  new Chart(el, {
    type: 'line',
    data: {
      labels: curve.map(p => new Date(p[0]).toISOString().slice(5, 10)),
      datasets: [{
        data: curve.map(p => p[1]),
        borderColor: '#FF8C5A', backgroundColor: 'transparent',
        tension: .4, pointRadius: 0, borderWidth: 1.5,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { x: { display: false }, y: { display: false } },
    },
  });
}

async function loadBacktests() {
  try {
    const data = await API.listBacktests({ limit: 50 });
    if (!resultsGrid) return;
    resultsGrid.innerHTML = '';
    if (!data.backtests.length) {
      resultsGrid.innerHTML = '<div class="col-span-full text-center text-slate-500 py-8">Бэктестов пока нет. Запусти первый — форма выше.</div>';
      return;
    }
    for (const bt of data.backtests) resultsGrid.appendChild(renderBacktest(bt));
    // Poll running ones
    const running = data.backtests.filter(b => b.status === 'pending' || b.status === 'running');
    if (running.length) setTimeout(loadBacktests, 2000);
  } catch (err) {
    Toast.error('Ошибка загрузки бэктестов: ' + err.message);
  }
}

document.getElementById('btForm')?.addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const raw = Object.fromEntries(fd.entries());
  const symbol = (raw.symbol || '').toUpperCase().trim();
  const payload = {
    name: `${symbol} ${raw.strategy} ${raw.timeframe}`,
    strategy: raw.strategy || 'levels',
    exchange: 'bybit',
    symbols: [symbol || 'BTCUSDT'],
    timeframe: raw.timeframe || '1h',
    startDate: raw.startDate,
    endDate: raw.endDate,
    initialCapital: 10000,
  };
  try {
    await API.createBacktest(payload);
    Toast.success('Бэктест запущен!');
    loadBacktests();
  } catch (err) {
    if (err.code === 'BACKTEST_LIMIT_REACHED') Toast.warn(err.message);
    else if (err.code === 'UPGRADE_REQUIRED') Toast.warn('Нужен план ' + (err.data?.requiredPlan || 'Pro'));
    else Toast.error(err.message);
  }
});

loadBacktests();
</script>
<script src="support-widget.js" defer></script>
</body>
</html>
