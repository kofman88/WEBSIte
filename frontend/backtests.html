<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>CHM Finance — Бэктесты</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="styles.css"/>
  <style>body{background:#0D0D0F;color:#f1f5f9;font-family:'Inter',sans-serif}</style>
<script>if(localStorage.getItem("chm_theme")==="light")document.documentElement.classList.add("light")</script>
</head>
<body>
<aside class="sidebar" id="sidebar">
  <a href="/" class="sidebar-logo" style="text-decoration:none;display:block">CHM<span>.</span></a>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="sidebar-link" data-page="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Дашборд</a>
    <a href="bots.html" class="sidebar-link" data-page="bots"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 014 4v1h2a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V9a2 2 0 012-2h2V6a4 4 0 014-4z"/></svg>Боты</a>
    <a href="signals.html" class="sidebar-link" data-page="signals"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>Сигналы</a>
    <a href="backtests.html" class="sidebar-link active" data-page="backtests"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6m6 0h10"/></svg>Бэктесты</a>
    <a href="wallet.html" class="sidebar-link" data-page="wallet"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12V7H5a2 2 0 010-4h14v4M3 5v14a2 2 0 002 2h16v-5"/></svg>Биржи</a>
    <a href="settings.html" class="sidebar-link" data-page="settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>Настройки</a>
  <a href="academy/" class="sidebar-link" data-page="academy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>Академия</a>
  </nav>
  <div class="sidebar-footer"><button onclick="Auth.logout()" class="sidebar-link" style="color:#f87171"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Выйти</button></div>
</aside>
<header class="topbar"><div class="flex items-center gap-4"><button id="sidebar-toggle" class="lg:hidden" style="background:none;border:none;color:#94a3b8;cursor:pointer"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button><h1 class="text-xl font-bold">Бэктесты</h1></div><div class="topbar-actions"><div class="relative" id="pageNotifWrap"><button onclick="togglePageNotif()" style="position:relative;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:none;background:none;cursor:pointer;color:#94a3b8"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg><div id="pageNotifDot" style="display:none;position:absolute;top:8px;right:8px;width:7px;height:7px;background:#ef4444;border-radius:50%"></div></button><div id="pageNotifPanel" class="notif-panel" style="display:none;position:absolute;top:100%;right:0;width:340px;max-height:360px;overflow-y:auto;background:rgba(15,23,42,.98);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.06);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.5);z-index:60"><div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.04)"><span style="font-weight:600;font-size:.85rem">Уведомления</span><button onclick="clearPageNotifs()" style="font-size:.7rem;color:#64748b;background:none;border:none;cursor:pointer">Очистить</button></div><div id="pageNotifList"><div style="text-align:center;padding:24px;color:#64748b;font-size:.8rem">Нет уведомлений</div></div></div></div><button data-theme-toggle onclick="togglePageTheme(this)" class="topbar-btn-icon">🌙</button><button onclick="togglePageLang(this)" class="topbar-btn-lang">EN</button><span id="sessionTimer" style="font-size:.65rem;color:#64748b;font-family:'JetBrains Mono',monospace;display:none" class="hidden sm:inline">00:00</span><div class="topbar-user"><div class="topbar-avatar">U</div></div></div></header>

<main class="main-content">
  <!-- Create Form -->
  <div class="card mb-6">
    <h2 class="font-bold mb-4">Новый бэктест</h2>
    <form id="btForm" class="grid md:grid-cols-3 lg:grid-cols-7 gap-4">
      <div style="position:relative"><label class="text-xs text-slate-500 block mb-1">Пара</label><input name="symbol" id="btSymbolInput" value="BTCUSDT" autocomplete="off" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none" onfocus="showBtCoins()" oninput="filterBtCoins()"/><div id="btCoinDD" style="display:none;position:absolute;top:100%;left:0;right:0;max-height:220px;overflow-y:auto;background:rgba(15,23,42,.98);border:1px solid rgba(255,255,255,.08);border-radius:10px;z-index:80;margin-top:4px;box-shadow:0 8px 30px rgba(0,0,0,.5)"></div></div>
      <div><label class="text-xs text-slate-500 block mb-1">Стратегия</label><select name="strategy" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"><option>levels</option><option>scalping</option><option>smc</option><option>gerchik</option></select></div>
      <div><label class="text-xs text-slate-500 block mb-1">Таймфрейм</label><select name="timeframe" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"><option>1m</option><option>5m</option><option>15m</option><option>1H</option><option>4H</option><option>1D</option></select></div>
      <div><label class="text-xs text-slate-500 block mb-1">Направление</label><select name="direction" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"><option value="both">Long + Short</option><option value="long">Только Long</option><option value="short">Только Short</option></select></div>
      <div><label class="text-xs text-slate-500 block mb-1">Начало</label><input name="startDate" type="date" value="2025-01-01" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
      <div><label class="text-xs text-slate-500 block mb-1">Конец</label><input name="endDate" type="date" value="2025-12-31" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"/></div>
      <div class="flex items-end"><button type="submit" class="w-full py-2 rounded-lg font-semibold text-white text-sm" style="background:linear-gradient(135deg,#C850C0,#FF6B35)">Запустить</button></div>
    </form>
    <div class="flex items-center gap-3 mt-3">
      <label class="flex items-center gap-2 text-xs text-slate-400 cursor-pointer"><input type="checkbox" name="trendFilter" id="trendFilter" checked class="accent-violet-500"/> Фильтр тренда (EMA 200)</label>
    </div>
  </div>

  <!-- Results Grid -->
  <div class="flex items-center justify-between mb-4">
    <h2 class="font-bold">Результаты</h2>
    <div class="flex gap-2">
      <button onclick="clearFailed()" class="text-xs px-3 py-1.5 rounded-lg bg-slate-800/50 border border-slate-700 text-slate-400 hover:text-amber-400 hover:border-amber-500/30 transition">Удалить failed</button>
      <button onclick="clearAll()" class="text-xs px-3 py-1.5 rounded-lg bg-red-500/5 border border-red-500/20 text-red-400 hover:bg-red-500/10 transition">Удалить все</button>
    </div>
  </div>
  <div class="grid md:grid-cols-2 gap-4 mb-6" id="btResults">
    <div style="text-align:center;padding:40px;color:#64748b;grid-column:1/-1">Загрузка...</div>
  </div>
</main>

<script src="app.js"></script><script src="shared-ui.js"></script>
<script>
if(!Auth.isLoggedIn())window.location.href='/?login=1';
Sidebar.init('backtests');

async function loadBacktests(){
  const grid=document.getElementById('btResults');
  try{
    const res=await API.getBacktests();
    const bts=res.backtests||[];
    if(!bts.length){
      grid.innerHTML='<div style="text-align:center;padding:48px;color:#64748b;grid-column:1/-1"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 12px;opacity:.3"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6m18-2V5a2 2 0 00-2-2h-2a2 2 0 00-2 2v14"/></svg>Бэктестов пока нет<br><span style="font-size:.8rem">Заполните форму выше и нажмите «Запустить»</span></div>';
      return;
    }
    grid.innerHTML=bts.map(b=>{
      const st=b.status;
      let r={};try{r=b.results?JSON.parse(b.results):{}}catch(_){}
      const isRunning=st==='running'||st==='pending';
      const stratName=((b.name||'').split(' ')[1]||'levels').toLowerCase();
      const stratColors={smc:'violet',scalp:'cyan',gerchik:'blue',levels:'amber',scalping:'cyan'};
      const sc=stratColors[stratName]||'amber';
      const pnl=Number(r.totalPnl||0);
      return `<div class="card ${isRunning?'':'card-glow'}" ${isRunning?'style="opacity:.7"':''}>
        <div class="flex items-center justify-between mb-3">
          <div><div class="font-semibold text-sm">${b.name||b.symbol+' '+b.timeframe} <span class="text-[.6rem] px-1.5 py-0.5 rounded-full bg-${sc}-500/15 text-${sc}-300 uppercase font-bold">${stratName}</span></div><div class="text-xs text-slate-500 mt-1">${b.start_date} — ${b.end_date} &middot; ${b.symbol}</div></div>
          <div class="flex items-center gap-2">
            <span class="text-[.65rem] px-2 py-0.5 rounded-full ${st==='completed'?'bg-green-500/15 text-green-400':st==='failed'?'bg-red-500/15 text-red-400':'bg-amber-500/15 text-amber-400'}">${st==='completed'?'Завершён':st==='failed'?'Ошибка':'Выполняется'}</span>
          </div>
        </div>
        ${st==='completed'&&r.totalPnl!==undefined?`<div class="grid grid-cols-3 gap-3 text-center text-sm mb-3">
          <div class="bg-slate-800/30 rounded-lg p-2"><div class="text-[.65rem] text-slate-500 mb-0.5">PnL</div><div class="font-bold ${pnl>=0?'text-green-400':'text-red-400'}">${pnl>=0?'+':''}$${Math.abs(pnl).toFixed(0)}</div></div>
          <div class="bg-slate-800/30 rounded-lg p-2"><div class="text-[.65rem] text-slate-500 mb-0.5">Win Rate</div><div class="font-bold">${Number(r.winRate||0).toFixed(0)}%</div></div>
          <div class="bg-slate-800/30 rounded-lg p-2"><div class="text-[.65rem] text-slate-500 mb-0.5">Sharpe</div><div class="font-bold">${Number(r.sharpeRatio||0).toFixed(2)}</div></div>
        </div>
        <div class="grid grid-cols-3 gap-3 text-center text-sm mb-3">
          <div class="bg-slate-800/30 rounded-lg p-2"><div class="text-[.65rem] text-slate-500 mb-0.5">Max DD</div><div class="text-red-400">${Number(r.maxDrawdown||0).toFixed(1)}%</div></div>
          <div class="bg-slate-800/30 rounded-lg p-2"><div class="text-[.65rem] text-slate-500 mb-0.5">Profit Factor</div><div>${Number(r.profitFactor||0).toFixed(2)}</div></div>
          <div class="bg-slate-800/30 rounded-lg p-2"><div class="text-[.65rem] text-slate-500 mb-0.5">Сделок</div><div>${r.totalTrades||0}</div></div>
        </div>
        <div class="flex gap-2">
          <button onclick="delBT(${b.id})" class="text-[.7rem] px-3 py-1.5 rounded-lg bg-red-500/5 border border-red-500/20 text-red-400 hover:bg-red-500/10 transition flex-shrink-0">Удалить</button>
        </div>
        `:isRunning?'<div class="w-full bg-slate-800 rounded-full h-2 mt-4"><div class="bg-orange-500 h-2 rounded-full animate-pulse" style="width:60%"></div></div><div class="text-xs text-slate-500 mt-2">Выполняется...</div>':'<div class="text-xs text-red-400 mt-2 mb-2">Ошибка выполнения</div><button onclick="delBT('+b.id+')" class="text-[.7rem] px-3 py-1.5 rounded-lg bg-red-500/5 border border-red-500/20 text-red-400 hover:bg-red-500/10 transition">Удалить</button>'}
      </div>`}).join('');
  }catch(e){
    grid.innerHTML='<div style="text-align:center;padding:40px;color:#ef4444;grid-column:1/-1">Ошибка: '+e.message+'</div>';
  }
}
loadBacktests();

async function delBT(id){try{await API.deleteBacktest(id);Toast.success('Удалён');loadBacktests()}catch(e){Toast.error(e.message)}}
async function clearAll(){
  if(!confirm('Удалить ВСЕ бэктесты? Это действие нельзя отменить.'))return;
  try{
    const res=await API.getBacktests();
    const all=(res.backtests||[]);
    let count=0;
    for(const b of all){try{await API.deleteBacktest(b.id);count++}catch(_){}}
    Toast.success(count+' бэктестов удалено');loadBacktests();
  }catch(e){Toast.error(e.message)}
}
async function clearFailed(){
  try{
    const res=await API.getBacktests();
    const failed=(res.backtests||[]).filter(b=>b.status==='failed');
    for(const b of failed){try{await API.deleteBacktest(b.id)}catch(_){}}
    Toast.success(failed.length+' бэктестов удалено');loadBacktests();
  }catch(e){Toast.error(e.message)}
}
document.getElementById('btForm')?.addEventListener('submit',async e=>{
  e.preventDefault();
  const fd=new FormData(e.target);
  const strat=fd.get('strategy');
  const dir=fd.get('direction');
  const tf=document.getElementById('trendFilter').checked;
  const data={name:fd.get('symbol')+' '+strat,symbol:fd.get('symbol'),exchangeName:'bybit',timeframe:fd.get('timeframe'),startDate:fd.get('startDate'),endDate:fd.get('endDate'),initialCapital:10000,strategyConfig:JSON.stringify({strategy:strat,direction:dir,trendFilter:tf})};
  try{await API.createBacktest(data);Toast.success('Бэктест запущен!');loadBacktests()}catch(err){Toast.error(err.message)}
});

// Searchable coin dropdown for backtests
const BT_COINS=['BTCUSDT','ETHUSDT','SOLUSDT','XRPUSDT','DOGEUSDT','BNBUSDT','ADAUSDT','AVAXUSDT','LINKUSDT','NEARUSDT','SUIUSDT','INJUSDT','ARBUSDT','OPUSDT','APTUSDT','DOTUSDT','MATICUSDT','UNIUSDT','LTCUSDT','ATOMUSDT','FILUSDT','TRXUSDT','SHIBUSDT','PEPEUSDT','WIFUSDT','RUNEUSDT','FETUSDT','ONDOUSDT','RENDERUSDT','JUPUSDT'];
function showBtCoins(){renderBtCoinList(BT_COINS)}
function filterBtCoins(){const q=(document.getElementById('btSymbolInput').value||'').toUpperCase();renderBtCoinList(BT_COINS.filter(c=>c.includes(q)))}
function renderBtCoinList(list){
  const dd=document.getElementById('btCoinDD');
  if(!list.length){dd.innerHTML='<div style="padding:12px;text-align:center;color:#64748b;font-size:.75rem">Нет результатов</div>';dd.style.display='block';return}
  dd.innerHTML=list.map(c=>`<div onclick="document.getElementById('btSymbolInput').value='${c}';document.getElementById('btCoinDD').style.display='none'" style="padding:8px 12px;cursor:pointer;font-size:.8rem;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.03);transition:background .1s" onmouseover="this.style.background='rgba(79,70,229,.1)'" onmouseout="this.style.background='none'"><span style="font-weight:600;color:#f1f5f9">${c.replace('USDT','')}</span><span style="color:#64748b">/USDT</span></div>`).join('');
  dd.style.display='block';
}
document.addEventListener('click',e=>{if(!e.target.closest('#btSymbolInput')&&!e.target.closest('#btCoinDD'))document.getElementById('btCoinDD').style.display='none'});
</script>
</body>
</html>
