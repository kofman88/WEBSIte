<!DOCTYPE html>
<html lang="ru" class="aura-page">
<head>
  
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.iconify.design" crossorigin>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>CHM Finance — Сигналы</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
  
  <script src="assets/vendor/chart.umd.min.js"></script>
  <link rel="stylesheet" href="tailwind.css"/>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="aura-theme.css"/>
  <style>@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}.signal-new{animation:slideIn .4s cubic-bezier(.16,1,.3,1)}.conf-bar{height:6px;border-radius:9999px;background:rgba(255,255,255,.06);overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.4)}.conf-fill{height:100%;border-radius:9999px;transition:width .5s cubic-bezier(.16,1,.3,1)}</style>
</head>
<body>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">CHM<span>.</span></div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="sidebar-link" data-page="dashboard"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Дашборд</a>
    <a href="bots.html" class="sidebar-link" data-page="bots"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 014 4v1h2a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V9a2 2 0 012-2h2V6a4 4 0 014-4z"/></svg>Боты</a>
    <a href="signals.html" class="sidebar-link active" data-page="signals"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>Сигналы</a>
    <a href="analytics.html" class="sidebar-link" data-page="analytics"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/></svg>Аналитика</a>
    <a href="backtests.html" class="sidebar-link" data-page="backtests"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6m6 0h10"/></svg>Бэктесты</a>
    <a href="wallet.html" class="sidebar-link" data-page="wallet"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12V7H5a2 2 0 010-4h14v4M3 5v14a2 2 0 002 2h16v-5"/></svg>Кошелёк</a>
    <a href="leaderboard.html" class="sidebar-link" data-page="leaderboard"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>Leaderboard</a>
    <a href="settings.html" class="sidebar-link" data-page="settings"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>Настройки</a>
  </nav>
  <div class="sidebar-footer"><button onclick="Auth.logout()" class="sidebar-link" style="color:#C8B9B9"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Выйти</button></div>
</aside>
<header class="topbar"><div class="flex items-center gap-4"><button id="sidebar-toggle" class="lg:hidden" aria-label="Toggle menu" style="background:none;border:none;color:rgba(255,255,255,.62);cursor:pointer"><svg aria-hidden="true" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button><h1 class="text-xl font-bold">Сигналы</h1><div class="flex items-center gap-2 ml-4"><span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span><span class="text-xs text-green-400">Live</span></div></div><div class="topbar-actions"><button id="shellLang" type="button" class="shell-topbar-btn" title="Language">EN</button><button id="shellTheme" type="button" class="shell-topbar-btn" title="Toggle theme" aria-label="Toggle theme"></button><div class="topbar-user"><div class="topbar-avatar">U</div></div></div></header>

<main class="main-content">
  <!-- Stats -->
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
    <div class="stat-card"><div class="stat-card-label">Сигналов сегодня</div><div class="stat-card-value">—</div></div>
    <div class="stat-card"><div class="stat-card-label">Win Rate</div><div class="stat-card-value text-green-400">—</div></div>
    <div class="stat-card"><div class="stat-card-label">Ср. Confidence</div><div class="stat-card-value text-cyan-400">—</div></div>
  </div>

  <!-- Filters (all 6 strategies in Aura pill style) -->
  <div class="flex flex-wrap gap-2 mb-6" id="strategyFilters">
    <button data-filter-strategy="all"      class="filter-btn chip-aura active">Все</button>
    <button data-filter-strategy="smc"      class="filter-btn chip-aura">SMC</button>
    <button data-filter-strategy="gerchik"  class="filter-btn chip-aura">Gerchik</button>
    <button data-filter-strategy="scalping" class="filter-btn chip-aura">Scalping</button>
    <button data-filter-strategy="levels"   class="filter-btn chip-aura">Levels</button>
    <button data-filter-strategy="dca"      class="filter-btn chip-aura">DCA</button>
    <button data-filter-strategy="grid"     class="filter-btn chip-aura">Grid</button>
  </div>
  <style>
    /* Aura pill — inherits from .chip-aura, adds filter-active state */
    .chip-aura {
      display: inline-flex; align-items: center; gap: 6px;
      height: 34px; padding: 0 16px;
      font-family: 'Inter', sans-serif;
      font-size: 12px; font-weight: 500; line-height: 1;
      letter-spacing: 0.01em;
      color: rgba(255, 255, 255, 0.7);
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.015));
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 9999px;
      box-shadow: inset 0 1px 1px rgba(255,255,255,.05), inset 0 -1px 2px rgba(0,0,0,.35);
      cursor: pointer;
      white-space: nowrap;
      transition: all .18s cubic-bezier(.4,0,.2,1);
    }
    .chip-aura:hover {
      color: #fff;
      border-color: rgba(255, 255, 255, 0.22);
      background: linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.02));
      transform: translateY(-1px);
    }
    .chip-aura.active {
      background: linear-gradient(180deg, #FF7840 0%, #FF5A1F 55%, #C44610 100%);
      color: #000;
      font-weight: 600;
      border-color: #FF5A1F;
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,.3),
        inset 0 -1px 2px rgba(0,0,0,.25),
        0 4px 10px -2px rgba(255,90,31,.45),
        0 0 0 1px rgba(255,90,31,.35);
    }
    .chip-aura.active:hover {
      filter: brightness(1.06);
      transform: translateY(-1px);
    }
    html.light .chip-aura { color: rgba(10,10,10,.65); background: linear-gradient(180deg,rgba(0,0,0,.04),rgba(0,0,0,.01)); border-color: rgba(0,0,0,.12); }
    html.light .chip-aura:hover { color: #0A0A0A; border-color: rgba(0,0,0,.22); }
    html.light .chip-aura.active { color: #fff; border-color: #FF5A1F; }
  </style>

  <div class="grid lg:grid-cols-3 gap-6">
    <!-- Signal Feed (filled by loadSignals()) -->
    <div class="lg:col-span-2 space-y-4" id="signalFeed">
      <div class="card text-center text-slate-500 py-8">Загрузка сигналов…</div>
    </div>

    <!-- Performance Panel -->
    <div class="space-y-4">
      <div class="card">
        <h3 class="font-bold mb-4">По стратегиям</h3>
        <canvas id="stratChart" height="200"></canvas>
      </div>
      <div class="card">
        <h3 class="font-bold mb-4">Топ символы</h3>
        <div class="space-y-3" id="topSymbolsList">
          <div class="text-xs text-slate-500 text-center py-2">—</div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="app.js"></script>
<script src="shell.js?v=6" defer></script>
<script>
if(!Auth.requireAuth()) throw new Error('noauth');
document.querySelectorAll('.sidebar-link[data-page="signals"]').forEach(a => a.classList.add('active'));

const FEED = document.getElementById('signalFeed');
let activeStrategy = null; // null = all

async function loadStats() {
  try {
    const s = await API.mySignalStats();
    const cards = document.querySelectorAll('.stat-card .stat-card-value');
    if (cards[0]) cards[0].textContent = s.total;
    if (cards[1]) cards[1].textContent = s.winRate !== null ? Fmt.percent(s.winRate * 100, { decimals: 0 }) : '—';
    if (cards[2]) cards[2].textContent = s.avgConfidence ? Math.round(s.avgConfidence) : '—';
  } catch (_e) {}
}

async function loadSignals() {
  if (!FEED) return;
  try {
    const data = await API.listSignals({ limit: 30, strategy: activeStrategy || undefined });
    FEED.innerHTML = '';
    if (!data.signals.length) {
      FEED.innerHTML = '<div class="card text-center text-slate-500 py-8">Пока сигналов нет. Активируй бота.</div>';
      renderTopSymbols([]);
      return;
    }
    for (const s of data.signals) FEED.appendChild(renderSignal(s));
    renderTopSymbols(data.signals);
  } catch (err) {
    if (err.code === 'SIGNAL_LIMIT_REACHED') {
      FEED.innerHTML = '<div class="card text-center py-8"><div class="text-yellow-400 font-semibold mb-2">Дневной лимит сигналов</div><div class="text-sm text-slate-500">Free-тариф — 3 сигнала в день. <a href="#pricing" class="text-indigo-400 underline">Upgrade</a></div></div>';
    } else {
      FEED.innerHTML = '<div class="card text-red-400">' + (err.message||'Ошибка') + '</div>';
    }
  }
}

function renderSignal(s, isNew = false) {
  const sideColor = s.side === 'long' ? 'bg-green-500/15 text-green-400' : 'bg-red-500/15 text-red-400';
  const card = document.createElement('div');
  card.className = 'card ' + (isNew ? 'signal-new' : '');
  card.innerHTML = `
    <div class="flex items-center justify-between mb-3">
      <div class="flex items-center gap-3">
        <span class="text-lg font-bold">${escapeHtml(s.symbol)}</span>
        <span class="text-xs px-2 py-0.5 rounded-full ${sideColor}">${s.side.toUpperCase()}</span>
        <span class="text-xs px-2 py-0.5 rounded-full bg-indigo-500/15 text-indigo-400">${escapeHtml((s.strategy||'').toUpperCase())}</span>
      </div>
      <div class="flex items-center gap-2">
        ${isNew ? '<span class="text-xs px-2 py-0.5 rounded-full bg-green-500/15 text-green-400 animate-pulse">NEW</span>' : ''}
        <span class="text-xs text-slate-500">${Fmt.timeAgo(s.createdAt)}</span>
      </div>
    </div>
    <div class="grid grid-cols-4 gap-3 text-sm mb-3">
      <div><div class="text-xs text-slate-500">Entry</div><div class="font-mono">${Fmt.price(s.entry)}</div></div>
      <div><div class="text-xs text-slate-500">SL</div><div class="font-mono text-red-400">${Fmt.price(s.stopLoss)}</div></div>
      <div><div class="text-xs text-slate-500">TP1</div><div class="font-mono text-green-400">${s.tp1 ? Fmt.price(s.tp1) : '—'}</div></div>
      <div><div class="text-xs text-slate-500">TP2</div><div class="font-mono text-green-400">${s.tp2 ? Fmt.price(s.tp2) : '—'}</div></div>
    </div>
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2 flex-1"><span class="text-xs text-slate-500">Confidence:</span>
        <div class="conf-bar flex-1"><div class="conf-fill" style="width:${s.confidence||0}%;background:linear-gradient(90deg,#FF8C5A,#FF5A1F)"></div></div>
        <span class="text-xs text-green-400">${s.confidence || '—'}</span>
      </div>
      <span class="text-xs text-slate-500 ml-4">R:R ${s.riskReward||'—'}</span>
    </div>
    ${s.reason ? `<div class="text-xs text-slate-400 mt-2">${escapeHtml(s.reason)}</div>` : ''}`;
  return card;
}

function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

// Filter buttons — visual toggle + reload. Style handled by .chip-aura.active.
document.querySelectorAll('[data-filter-strategy]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter-strategy]').forEach((b) => b.classList.remove('active'));
    btn.classList.add('active');
    activeStrategy = btn.getAttribute('data-filter-strategy') || null;
    if (activeStrategy === 'all') activeStrategy = null;
    loadSignals();
  });
});

// ── Top symbols by signal count from current feed ──
function renderTopSymbols(signals) {
  const host = document.getElementById('topSymbolsList');
  if (!host) return;
  if (!signals.length) {
    host.innerHTML = '<div class="text-xs text-slate-500 text-center py-2">Нет данных</div>';
    return;
  }
  const counts = new Map();
  for (const s of signals) counts.set(s.symbol, (counts.get(s.symbol) || 0) + 1);
  const top = [...counts.entries()].sort((a, b) => b[1] - a[1]).slice(0, 5);
  host.innerHTML = top.map(([sym, n]) =>
    `<div class="flex items-center justify-between text-sm"><span>${sym}</span><span class="text-slate-400 text-xs">${n} сигн.</span></div>`,
  ).join('');
}

// Strategy donut — breakdown by strategy when we actually have signals.
// Empty state shows a placeholder instead of a misleading solid blue ring.
(async () => {
  const canvas = document.getElementById('stratChart');
  if (!canvas) return;
  const host = canvas.parentElement;
  try {
    const gl = await API.globalSignalStats();
    const byStrategy = gl.byStrategy || {};
    const labels = Object.keys(byStrategy);
    const values = labels.map((k) => byStrategy[k]);
    const total = values.reduce((a, b) => a + b, 0);
    if (!total) {
      canvas.remove();
      const empty = document.createElement('div');
      empty.className = 'text-xs text-slate-500 text-center py-8';
      empty.textContent = 'Нет данных';
      host.appendChild(empty);
      return;
    }
    const palette = { levels:'#FF8C5A', smc:'#FF8C5A', gerchik:'#66876E', scalping:'#C8B9B9' };
    new Chart(canvas, {
      type: 'doughnut',
      data: {
        labels: labels.map((k) => k[0].toUpperCase() + k.slice(1)),
        datasets: [{
          data: values,
          backgroundColor: labels.map((k) => palette[k] || '#FF5A1F'),
          borderWidth: 0,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: true, cutout: '62%',
        plugins: { legend: { position: 'bottom', labels: { color: 'rgba(255,255,255,.62)', padding: 12, font: { size: 11 }, boxWidth: 10 } } },
      },
    });
  } catch (_e) {
    canvas.remove();
    const err = document.createElement('div');
    err.className = 'text-xs text-slate-500 text-center py-8';
    err.textContent = 'Нет данных';
    host.appendChild(err);
  }
})();

// WS live new signal
WS.on('signal', (msg) => {
  if (!msg.data) return;
  if (activeStrategy && msg.data.strategy !== activeStrategy) return;
  const node = renderSignal(msg.data, true);
  if (FEED) FEED.insertBefore(node, FEED.firstChild);
  Toast.info('Новый сигнал: ' + msg.data.symbol + ' ' + msg.data.side.toUpperCase());
  loadStats();
});

loadStats();
loadSignals();
setInterval(loadStats, 60_000);
</script>
</body>
</html>
