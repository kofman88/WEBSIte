<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>CHM Finance — Сигналы</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="styles.css"/>
  <style>body{background:#0D0D0F;color:#f1f5f9;font-family:'Inter',sans-serif}.mono{font-family:'JetBrains Mono',monospace}.conf-bar{height:4px;border-radius:2px;background:#1e293b}.conf-fill{height:100%;border-radius:2px}.skeleton{background:linear-gradient(90deg,rgba(30,41,59,.3) 25%,rgba(30,41,59,.5) 50%,rgba(30,41,59,.3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}.filter-btn.active{background:rgba(255,140,0,.15)!important;color:#FF8C00!important;border-color:rgba(255,140,0,.3)!important}</style>
<script>if(localStorage.getItem("chm_theme")==="light")document.documentElement.classList.add("light")</script>
</head>
<body>
<aside class="sidebar" id="sidebar"><a href="/" class="sidebar-logo" style="text-decoration:none;display:block">CHM<span>.</span></a><nav class="sidebar-nav"><a href="dashboard.html" class="sidebar-link" data-page="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Дашборд</a><a href="bots.html" class="sidebar-link" data-page="bots"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 014 4v1h2a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V9a2 2 0 012-2h2V6a4 4 0 014-4z"/></svg>Боты</a><a href="signals.html" class="sidebar-link active" data-page="signals"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>Сигналы</a><a href="backtests.html" class="sidebar-link" data-page="backtests"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6m6 0h10"/></svg>Бэктесты</a><a href="wallet.html" class="sidebar-link" data-page="wallet"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12V7H5a2 2 0 010-4h14v4M3 5v14a2 2 0 002 2h16v-5"/></svg>Биржи</a><a href="settings.html" class="sidebar-link" data-page="settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>Настройки</a><a href="academy/" class="sidebar-link" data-page="academy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>Академия</a>
  </nav><div class="sidebar-footer"><button onclick="Auth.logout()" class="sidebar-link" style="color:#f87171"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Выйти</button></div></aside>
<header class="topbar"><div class="flex items-center gap-4"><button id="sidebar-toggle" class="lg:hidden" style="background:none;border:none;color:#94a3b8;cursor:pointer"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button><h1 class="text-xl font-bold">Сигналы</h1><div class="flex items-center gap-2 ml-4"><span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span><span class="text-xs text-green-400">Live</span></div></div><div class="topbar-actions"><div class="relative" id="pageNotifWrap"><button onclick="togglePageNotif()" style="position:relative;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:none;background:none;cursor:pointer;color:#94a3b8"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg><div id="pageNotifDot" style="display:none;position:absolute;top:8px;right:8px;width:7px;height:7px;background:#ef4444;border-radius:50%"></div></button><div id="pageNotifPanel" class="notif-panel" style="display:none;position:absolute;top:100%;right:0;width:340px;max-height:360px;overflow-y:auto;background:rgba(15,23,42,.98);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.06);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.5);z-index:60"><div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.04)"><span style="font-weight:600;font-size:.85rem">Уведомления</span><button onclick="clearPageNotifs()" style="font-size:.7rem;color:#64748b;background:none;border:none;cursor:pointer">Очистить</button></div><div id="pageNotifList"><div style="text-align:center;padding:24px;color:#64748b;font-size:.8rem">Нет уведомлений</div></div></div></div><button data-theme-toggle onclick="togglePageTheme(this)" class="topbar-btn-icon">🌙</button><button onclick="togglePageLang(this)" class="topbar-btn-lang">EN</button><span id="sessionTimer" style="font-size:.65rem;color:#64748b;font-family:'JetBrains Mono',monospace;display:none" class="hidden sm:inline">00:00</span><div class="topbar-user"><div class="topbar-avatar">U</div></div></div></header>

<main class="main-content">
  <!-- Market Info Bar -->
  <div class="flex flex-wrap gap-3 mb-4 text-xs" id="sigMarketBar">
    <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-slate-800/30 border border-slate-800/50"><span class="text-slate-500">Режим:</span><span id="sigRegime" class="font-semibold">—</span></div>
    <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-slate-800/30 border border-slate-800/50"><span class="text-slate-500">BTC Funding:</span><span id="sigFunding" class="mono font-semibold">—</span></div>
    <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-slate-800/30 border border-slate-800/50"><span class="text-slate-500">BTC Тренд:</span><span id="sigBtcTrend" class="font-semibold">—</span></div>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
    <div class="stat-card"><div class="stat-card-label">Сигналов</div><div class="stat-card-value mono" id="stTotal"><div class="skeleton" style="height:2rem;width:40px"></div></div></div>
    <div class="stat-card"><div class="stat-card-label">Win Rate</div><div class="stat-card-value mono" id="stWR"><div class="skeleton" style="height:2rem;width:60px"></div></div></div>
    <div class="stat-card"><div class="stat-card-label">Ср. Confidence</div><div class="stat-card-value mono" id="stConf"><div class="skeleton" style="height:2rem;width:50px"></div></div></div>
  </div>
  <div class="flex items-center justify-between mb-4">
  <div class="flex items-center gap-3 text-xs text-slate-500"><span id="scannerStatus">Сканер: обновляется...</span><span id="lastUpdate"></span></div>
  <button onclick="toggleSigSound()" id="sigSoundBtn" class="text-xs px-3 py-1.5 rounded-lg bg-slate-800/50 border border-slate-700 text-slate-400 hover:text-white transition flex items-center gap-1.5" title="Звук уведомлений"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path id="sigSoundWave" d="M15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14"/></svg><span id="sigSoundLabel">ON</span></button>
</div>
  <div class="flex flex-wrap gap-2 mb-6" id="filters">
    <button class="filter-btn active text-xs px-4 py-2 rounded-lg bg-slate-800/50 text-slate-400 border border-slate-700" data-f="all">Все</button>
    <button class="filter-btn text-xs px-4 py-2 rounded-lg bg-slate-800/50 text-slate-400 border border-slate-700" data-f="levels">Levels</button>
    <button class="filter-btn text-xs px-4 py-2 rounded-lg bg-slate-800/50 text-slate-400 border border-slate-700" data-f="smc">SMC</button>
    <button class="filter-btn text-xs px-4 py-2 rounded-lg bg-slate-800/50 text-slate-400 border border-slate-700" data-f="scalping">Scalping</button>
    <button class="filter-btn text-xs px-4 py-2 rounded-lg bg-slate-800/50 text-slate-400 border border-slate-700" data-f="gerchik">Gerchik</button>
    <span class="border-l border-slate-700 mx-1"></span>
    <button class="filter-btn text-xs px-4 py-2 rounded-lg bg-slate-800/50 text-slate-400 border border-slate-700" data-f="long">LONG</button>
    <button class="filter-btn text-xs px-4 py-2 rounded-lg bg-slate-800/50 text-slate-400 border border-slate-700" data-f="short">SHORT</button>
  </div>
  <div class="grid lg:grid-cols-3 gap-6">
    <div class="lg:col-span-2">
    <div class="space-y-3" id="signalFeed"><div class="skeleton" style="height:120px"></div><div class="skeleton" style="height:120px"></div></div>
    <div class="flex justify-between items-center mt-3"><button onclick="sigPage=Math.max(1,sigPage-1);loadSignals()" class="text-xs px-3 py-1 rounded-lg bg-slate-800/50 text-slate-400 border border-slate-700">&larr; Назад</button><span class="text-xs text-slate-500">Стр. <span id="sigPageNum">1</span></span><button onclick="sigPage++;loadSignals()" class="text-xs px-3 py-1 rounded-lg bg-slate-800/50 text-slate-400 border border-slate-700">Далее &rarr;</button></div>
    </div>
    <div class="space-y-4">
      <div class="card"><h3 class="font-bold mb-4">По стратегиям</h3><canvas id="stratChart" height="200"></canvas></div>
      <div class="card"><h3 class="font-bold mb-4">Топ символы</h3><div id="topSymbols"><div class="skeleton" style="height:100px"></div></div></div>
    </div>
  </div>
</main>

<script src="app.js"></script><script src="shared-ui.js"></script>
<script>
if(!Auth.isLoggedIn())window.location.href='/?login=1';
Sidebar.init('signals');
let allSignals=[],activeFilter='all',sChart=null,sigPage=1,sigTotal=0;

document.getElementById('filters').addEventListener('click',e=>{const b=e.target.closest('.filter-btn');if(!b)return;document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');activeFilter=b.dataset.f;renderSignals()});

function renderSignals(){
  const feed=document.getElementById('signalFeed');
  let f=allSignals;
  if(activeFilter!=='all'){if(activeFilter==='long'||activeFilter==='short')f=f.filter(s=>s.direction===activeFilter);else f=f.filter(s=>s.strategy===activeFilter)}
  if(!f.length){feed.innerHTML='<div style="text-align:center;padding:48px;color:#64748b"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 12px;opacity:.3"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>Сигналов пока нет<br><span style="font-size:.75rem">Сканер обновляется каждые 30 сек</span></div>';return}
  feed.innerHTML=f.map(s=>{
    const isL=s.direction==='long',c=s.confidence||0,cc=c>=80?'#10b981':c>=60?'#f59e0b':'#ef4444',p=s.pnl_pct;
    return `<div class="card" ${s.result==='loss'?'style="opacity:.5"':''}>
      <div class="flex items-center justify-between mb-3"><div class="flex items-center gap-2"><span class="text-lg font-bold">${s.symbol}</span><span class="text-xs px-2 py-0.5 rounded-full ${isL?'bg-green-500/15 text-green-400':'bg-red-500/15 text-red-400'}">${s.direction.toUpperCase()}</span><span class="text-xs px-2 py-0.5 rounded-full bg-indigo-500/15 text-indigo-300">${s.strategy}</span></div><div class="flex items-center gap-2">${(Date.now()-new Date(s.created_at).getTime())<120000?'<span class="text-[.6rem] px-1.5 py-0.5 rounded-full bg-green-500/15 text-green-400 animate-pulse">NEW</span>':''}<span class="text-xs text-slate-500">${s.timeframe||''} &middot; ${Utils.timeAgo(s.created_at)}</span></div></div>
      <div class="grid grid-cols-4 gap-3 text-sm mb-3"><div><div class="text-xs text-slate-500">Entry</div><div class="mono">${(+s.entry_price).toLocaleString('en',{maximumFractionDigits:6})}</div></div><div><div class="text-xs text-slate-500">SL</div><div class="mono text-red-400">${(+s.stop_loss).toLocaleString('en',{maximumFractionDigits:6})}</div></div><div><div class="text-xs text-slate-500">TP1</div><div class="mono text-green-400">${s.take_profit_1?(+s.take_profit_1).toLocaleString('en',{maximumFractionDigits:6}):'—'}</div></div><div><div class="text-xs text-slate-500">TP2</div><div class="mono text-green-400">${s.take_profit_2?(+s.take_profit_2).toLocaleString('en',{maximumFractionDigits:6}):'—'}</div></div></div>
      <div class="flex items-center justify-between"><div class="flex items-center gap-2 flex-1"><span class="text-xs text-slate-500">Confidence:</span><div class="conf-bar flex-1"><div class="conf-fill" style="width:${c}%;background:${cc}"></div></div><span class="text-xs" style="color:${cc}">${c}</span></div><button onclick="copySignal('${s.symbol}','${s.direction}','${s.entry_price}','${s.stop_loss}','${s.take_profit_1||''}','${s.take_profit_2||''}','${s.strategy}')" class="text-[.65rem] px-2 py-1 rounded-md bg-slate-800/50 border border-slate-700 text-slate-500 hover:text-white transition ml-2" title="Копировать сигнал">Copy</button>${p?`<span class="text-xs mono ml-2 ${p>0?'text-green-400':'text-red-400'}">${p>0?'+':''}${p}%</span>`:''}</div></div>`}).join('')}

async function loadSignals(){
  try{
    const ss=await API.getSignalStats().catch(()=>({stats:{}}));const st=ss.stats||ss||{};
    document.getElementById('stTotal').textContent=st.total||0;
    document.getElementById('scannerStatus').textContent='Сканер: активен • 20 монет';
    document.getElementById('lastUpdate').textContent='Обновлено: '+new Date().toLocaleTimeString('ru');
    document.getElementById('sigPageNum').textContent=sigPage;
    document.getElementById('stWR').textContent=(st.winRate||0)+'%';
    document.getElementById('stConf').textContent=Math.round(st.avgConfidence||0);
    const sg=await API.getSignals({limit:50,page:sigPage});allSignals=sg.signals||[];sigTotal=sg.pagination?.total||allSignals.length;renderSignals();checkNewSignals(allSignals.length);
    // Chart
    const by={};allSignals.forEach(s=>{by[s.strategy]=(by[s.strategy]||0)+1});
    const cols={levels:'#f59e0b',smc:'#818CF8',gerchik:'#3b82f6',scalping:'#06b6d4'};
    if(sChart)sChart.destroy();
    if(Object.keys(by).length){sChart=new Chart(document.getElementById('stratChart'),{type:'doughnut',data:{labels:Object.keys(by),datasets:[{data:Object.values(by),backgroundColor:Object.keys(by).map(k=>cols[k]||'#64748b'),borderWidth:0}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',padding:12,font:{size:11}}}}}})}
    // Top symbols
    const bs={};allSignals.forEach(s=>{if(!bs[s.symbol])bs[s.symbol]=0;bs[s.symbol]++});
    const top=Object.entries(bs).sort((a,b)=>b[1]-a[1]).slice(0,5);
    document.getElementById('topSymbols').innerHTML=top.length?top.map(([sym,cnt])=>`<div class="flex items-center justify-between text-sm mb-2"><span>${sym}</span><span class="mono text-slate-400">${cnt} sig</span></div>`).join(''):'<div style="text-align:center;padding:20px;color:#64748b;font-size:.8rem">Нет данных</div>';
  }catch(e){document.getElementById('signalFeed').innerHTML='<div class="card" style="text-align:center;padding:32px;color:#ef4444">Ошибка: '+e.message+'</div>'}
}
let lastSignalCount=0;
function checkNewSignals(count){
  if(lastSignalCount>0&&count>lastSignalCount){
    if(sigSoundEnabled){try{const a=new AudioContext();const o=a.createOscillator();const g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=800;g.gain.value=0.1;o.start();o.stop(a.currentTime+0.15);setTimeout(()=>{const o2=a.createOscillator();const g2=a.createGain();o2.connect(g2);g2.connect(a.destination);o2.frequency.value=1200;g2.gain.value=0.1;o2.start();o2.stop(a.currentTime+0.15)},200)}catch(_){}}
    Toast.success('Новый сигнал!')}
  lastSignalCount=count;
}
// Load market bar data
async function loadMarketBar(){
  try{
    const regime=await API.getMarketRegime().catch(()=>null);
    if(regime&&regime.regime){
      const el=document.getElementById('sigRegime');
      const labels={trending_up:'Тренд ↑',trending_down:'Тренд ↓',ranging:'Боковик',high_vol:'Волатильность ↑'};
      const colors={trending_up:'#00C853',trending_down:'#FF3D3D',ranging:'#FF8C00',high_vol:'#FFC107'};
      el.textContent=labels[regime.regime.regime]||regime.regime.regime||'—';
      el.style.color=colors[regime.regime.regime]||'#8E8E93';
    }
  }catch(_){}
  try{
    const f=await API.getFundingRate('BTCUSDT').catch(()=>null);
    if(f&&f.pct!==null){
      const el=document.getElementById('sigFunding');
      el.textContent=(f.pct>=0?'+':'')+f.pct+'%';
      el.style.color=Math.abs(f.pct)>0.05?'#FF3D3D':'#00C853';
    }
  }catch(_){}
  try{
    const t=await API.getBTCTrend().catch(()=>null);
    if(t){
      const el=document.getElementById('sigBtcTrend');
      if(t.trend==='up'){el.textContent='Бычий ↑';el.style.color='#00C853'}
      else if(t.trend==='down'){el.textContent='Медвежий ↓';el.style.color='#FF3D3D'}
      else{el.textContent='Нейтральный';el.style.color='#FF8C00'}
    }
  }catch(_){}
}
loadMarketBar();setInterval(loadMarketBar,120000);

// Copy signal to clipboard
function copySignal(sym,dir,entry,sl,tp1,tp2,strat){
  const text=`${sym} ${dir.toUpperCase()} (${strat})\nEntry: ${entry}\nSL: ${sl}${tp1?'\nTP1: '+tp1:''}${tp2?'\nTP2: '+tp2:''}`;
  navigator.clipboard.writeText(text).then(()=>Toast.success('Сигнал скопирован!')).catch(()=>Toast.error('Не удалось скопировать'));
}

// Sound toggle
let sigSoundEnabled=localStorage.getItem('chm_sig_sound')!=='off';
function toggleSigSound(){
  sigSoundEnabled=!sigSoundEnabled;
  localStorage.setItem('chm_sig_sound',sigSoundEnabled?'on':'off');
  updateSoundBtn();
}
function updateSoundBtn(){
  const label=document.getElementById('sigSoundLabel');
  const wave=document.getElementById('sigSoundWave');
  if(label)label.textContent=sigSoundEnabled?'ON':'OFF';
  if(wave)wave.style.opacity=sigSoundEnabled?'1':'0.3';
}
updateSoundBtn();

loadSignals();setInterval(loadSignals,30000);
</script>
</body>
</html>
